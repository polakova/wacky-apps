<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Plasma Field · 111 Wacky Apps</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌈</text></svg>">
<link rel="stylesheet" href="../_shared/wacky.css">
<style>
  body{overflow:hidden}
  #plas{position:fixed;inset:0;width:100vw;height:100vh;image-rendering:pixelated;display:block;cursor:crosshair}
  .controls{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:20;
    display:flex;gap:10px;flex-wrap:wrap;justify-content:center;
    background:rgba(26,22,35,.55);padding:10px 14px;border-radius:14px;backdrop-filter:blur(4px)}
  .controls label{color:#fff;font-family:var(--mono);font-size:13px;display:flex;align-items:center;gap:6px}
</style>
</head>
<body>
<div class="wacky-bar">
  <a class="back" href="../../">← all 111</a>
  <span class="title">🌈 Plasma Field</span>
  <span class="spacer"></span>
  <span class="num">#61</span>
</div>
<canvas id="plas"></canvas>
<div class="controls">
  <label>Speed <input id="speed" type="range" min="1" max="20" value="8"></label>
  <label>Zoom <input id="zoom" type="range" min="4" max="24" value="12"></label>
  <button class="btn pink" id="palette">Shift palette 🎨</button>
</div>
<script>
const cv=document.getElementById('plas'),cx=cv.getContext('2d');
const SC=4; let W,H,img,speed=8,zoom=12,pal=0,t=0;
function resize(){W=cv.width=Math.ceil(innerWidth/SC);H=cv.height=Math.ceil(innerHeight/SC);
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';img=cx.createImageData(W,H);}
resize();addEventListener('resize',resize);
document.getElementById('speed').oninput=e=>speed=+e.target.value;
document.getElementById('zoom').oninput=e=>zoom=+e.target.value;
document.getElementById('palette').onclick=()=>pal=(pal+1)%4;
let mx=.5,my=.5;
addEventListener('pointermove',e=>{mx=e.clientX/innerWidth;my=e.clientY/innerHeight;});
function hsv(h,s,v){h=(h%360+360)%360;const c=v*s,x=c*(1-Math.abs((h/60)%2-1)),m=v-c;let r,g,b;
  if(h<60)[r,g,b]=[c,x,0];else if(h<120)[r,g,b]=[x,c,0];else if(h<180)[r,g,b]=[0,c,x];
  else if(h<240)[r,g,b]=[0,x,c];else if(h<300)[r,g,b]=[x,0,c];else[r,g,b]=[c,0,x];
  return[(r+m)*255,(g+m)*255,(b+m)*255];}
function loop(){
  t+=speed*0.006;
  const d=img.data,z=zoom/1000,cxp=mx*W,cyp=my*H;
  for(let y=0;y<H;y++){for(let x=0;x<W;x++){
    let v=Math.sin((x*z)+t);
    v+=Math.sin((y*z*0.8)+t*1.3);
    v+=Math.sin(((x+y)*z*0.6)+t*0.7);
    const dx=x-cxp,dy=y-cyp;
    v+=Math.sin(Math.sqrt(dx*dx+dy*dy)*z*1.2 - t*1.5);
    v=v/4; // -1..1
    const hue=(v*180+t*30+pal*90)%360;
    const [r,g,b]=hsv(hue,0.85,0.5+0.5*Math.abs(v));
    const p=(y*W+x)*4;d[p]=r;d[p+1]=g;d[p+2]=b;d[p+3]=255;
  }}
  cx.putImageData(img,0,0);
  requestAnimationFrame(loop);
}
loop();
</script>
<script src="../_shared/wacky-buy.js" defer></script>
</body>
</html>
