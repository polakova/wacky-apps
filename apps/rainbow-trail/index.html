<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rainbow Trail · 111 Wacky Apps</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌟</text></svg>">
<link rel="stylesheet" href="../_shared/wacky.css">
<style>
  body{overflow:hidden}
  #trail{position:fixed;inset:0;z-index:5;touch-action:none}
  .hint{position:fixed;left:50%;top:46%;transform:translate(-50%,-50%);z-index:10;text-align:center;
    pointer-events:none;color:var(--ink);transition:opacity .6s}
  .hint .big{text-shadow:3px 3px 0 #fff}
  .modes{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:20;display:flex;gap:10px}
</style>
</head>
<body>
<div class="wacky-bar">
  <a class="back" href="../../">← all 111</a>
  <span class="title">🌟 Rainbow Trail</span>
  <span class="spacer"></span>
  <span class="num">#62</span>
</div>
<canvas id="trail"></canvas>
<div class="hint" id="hint"><div class="big">Wave hello 👋</div><p class="muted">Move your pointer to paint rainbows. They fade when you rest.</p></div>
<div class="modes">
  <button class="btn purple" id="shape">Sparkles ✨</button>
</div>
<script>
const cv=document.getElementById('trail'),cx=cv.getContext('2d'),hint=document.getElementById('hint');
let W,H,parts=[],hue=0,lastMove=performance.now(),shapeMode=0;
const SHAPES=['Sparkles ✨','Bubbles 🫧','Hearts 💗','Stars ⭐'];
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}resize();addEventListener('resize',resize);
document.getElementById('shape').onclick=e=>{shapeMode=(shapeMode+1)%SHAPES.length;e.target.textContent=SHAPES[shapeMode];};
let px=null,py=null;
function emit(x,y){
  if(px!=null){const d=Math.hypot(x-px,y-py),steps=Math.max(1,Math.floor(d/6));
    for(let i=0;i<steps;i++){const t=i/steps;spawn(px+(x-px)*t,py+(y-py)*t);}}
  else spawn(x,y);
  px=x;py=y;lastMove=performance.now();hint.style.opacity=0;
}
function spawn(x,y){hue=(hue+7)%360;
  parts.push({x,y,vx:(Math.random()-.5)*1.6,vy:(Math.random()-.5)*1.6-.6,
    r:6+Math.random()*8,hue,life:1,spin:Math.random()*7,vs:(Math.random()-.5)*.3});}
addEventListener('pointermove',e=>emit(e.clientX,e.clientY));
addEventListener('touchmove',e=>{const t=e.touches[0];emit(t.clientX,t.clientY);e.preventDefault();},{passive:false});
function drawShape(p){
  cx.save();cx.translate(p.x,p.y);cx.rotate(p.spin);cx.globalAlpha=p.life;
  const col='hsl('+p.hue+',95%,60%)';cx.fillStyle=col;cx.strokeStyle=col;
  const r=p.r;
  if(shapeMode===0){ // sparkle
    cx.beginPath();for(let i=0;i<8;i++){const a=i/8*Math.PI*2,rr=i%2?r*.4:r;cx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);}cx.closePath();cx.fill();
  }else if(shapeMode===1){ // bubble
    cx.globalAlpha=p.life*.5;cx.lineWidth=2;cx.beginPath();cx.arc(0,0,r,0,7);cx.stroke();
    cx.globalAlpha=p.life;cx.beginPath();cx.arc(-r*.3,-r*.3,r*.2,0,7);cx.fillStyle='#fff';cx.fill();
  }else if(shapeMode===2){ // heart
    cx.beginPath();const s=r/16;cx.moveTo(0,4*s);
    cx.bezierCurveTo(-7*s,-6*s,-16*s,4*s,0,14*s);cx.bezierCurveTo(16*s,4*s,7*s,-6*s,0,4*s);cx.fill();
  }else{ // star
    cx.beginPath();for(let i=0;i<10;i++){const a=i/10*Math.PI*2-Math.PI/2,rr=i%2?r*.45:r;cx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);}cx.closePath();cx.fill();
  }
  cx.restore();
}
function loop(){
  cx.fillStyle='rgba(253,246,227,0.18)';cx.fillRect(0,0,W,H);
  for(const p of parts){p.x+=p.vx;p.y+=p.vy;p.vy+=.02;p.spin+=p.vs;p.life-=.018;p.r*=.992;drawShape(p);}
  parts=parts.filter(p=>p.life>0);
  if(performance.now()-lastMove>1400){px=null;py=null;hint.style.opacity=1;}
  requestAnimationFrame(loop);
}
loop();
</script>
<script src="../_shared/wacky-buy.js" defer></script>
</body>
</html>
