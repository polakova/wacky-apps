<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Etch A Sketch · 111 Wacky Apps</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📿</text></svg>">
<link rel="stylesheet" href="../_shared/wacky.css">
<style>
  .toy{
    background:linear-gradient(160deg,#e23b2e,#b21d12);
    border:6px solid #7a120a;border-radius:28px;
    box-shadow:var(--shadow), inset 0 0 30px rgba(0,0,0,.3);
    padding:18px;max-width:460px;margin:8px auto;
  }
  .screen{
    background:#b9bfb0;border:5px solid #5a5a4a;border-radius:8px;
    box-shadow:inset 0 0 22px rgba(0,0,0,.35);overflow:hidden;
  }
  canvas{width:100%;display:block;touch-action:none}
  .knobs{display:flex;justify-content:space-between;margin-top:14px}
  .knob{
    width:62px;height:62px;border-radius:50%;
    background:radial-gradient(circle at 38% 32%, #fff, #ddd 40%, #888 100%);
    border:4px solid #5a5a4a;box-shadow:var(--shadow-sm);
    display:flex;align-items:center;justify-content:center;flex-direction:column;
    font-family:var(--mono);font-weight:900;font-size:10px;color:#333;text-align:center;
  }
  .pad{display:grid;grid-template-columns:repeat(3,46px);grid-template-rows:repeat(3,46px);
    gap:6px;justify-content:center;margin:12px auto 0}
  .pad .btn{padding:0;font-size:20px;display:flex;align-items:center;justify-content:center;border-radius:10px}
  .brand{font-family:var(--mono);font-weight:900;color:#ffe;text-align:center;
    letter-spacing:2px;font-size:14px;text-shadow:1px 1px 0 #7a120a;margin-top:10px}
</style>
</head>
<body>
<div class="wacky-bar">
  <a class="back" href="../../">← all 111</a>
  <span class="title">📿 Etch A Sketch</span>
  <span class="spacer"></span>
  <span class="num">#46</span>
</div>
<div class="wrap center">
  <div class="muted">Use arrow keys (or the knobs) to draw one unbroken line. Shake to erase!</div>
  <div class="toy">
    <div class="screen"><canvas id="c"></canvas></div>
    <div class="knobs">
      <div class="knob" id="lk">◀▶<br>LEFT</div>
      <div class="knob" id="rk">▲▼<br>RIGHT</div>
    </div>
    <div class="brand">★ WACKY-A-SKETCH ★</div>
  </div>
  <div class="pad">
    <span></span>
    <button class="btn" data-dir="up">▲</button>
    <span></span>
    <button class="btn" data-dir="left">◀</button>
    <button class="btn pink" id="shake">🤝</button>
    <button class="btn" data-dir="right">▶</button>
    <span></span>
    <button class="btn" data-dir="down">▼</button>
    <span></span>
  </div>
  <div class="row" style="justify-content:center;margin-top:10px">
    <button class="btn purple" id="shakeBtn">↔ Shake to clear</button>
  </div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 440, H = 320;
canvas.width = W; canvas.height = H;
let x = W/2, y = H/2;
const STEP = 4;

function clearScreen(){
  ctx.fillStyle = '#b9bfb0';
  ctx.fillRect(0,0,W,H);
  ctx.strokeStyle = '#34352c';
  ctx.lineWidth = 2.4;
  ctx.lineCap='round';
  x = W/2; y = H/2;
}
clearScreen();

function move(dx,dy){
  const nx = Math.max(2, Math.min(W-2, x+dx));
  const ny = Math.max(2, Math.min(H-2, y+dy));
  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.lineTo(nx,ny);
  ctx.stroke();
  x = nx; y = ny;
}

// continuous movement while held
const held = {};
function step(){
  if(held.left) move(-STEP,0);
  if(held.right) move(STEP,0);
  if(held.up) move(0,-STEP);
  if(held.down) move(0,STEP);
  requestAnimationFrame(step);
}
requestAnimationFrame(step);

const keymap = {ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
window.addEventListener('keydown', e=>{
  if(keymap[e.key]){ held[keymap[e.key]]=true; e.preventDefault(); }
});
window.addEventListener('keyup', e=>{
  if(keymap[e.key]) held[keymap[e.key]]=false;
});

// on-screen pad: press-and-hold support
document.querySelectorAll('[data-dir]').forEach(b=>{
  const d = b.dataset.dir;
  const on = e=>{ e.preventDefault(); held[d]=true; };
  const off= ()=>{ held[d]=false; };
  b.addEventListener('pointerdown', on);
  b.addEventListener('pointerup', off);
  b.addEventListener('pointerleave', off);
  b.addEventListener('pointercancel', off);
});

function shakeClear(){
  const toy = document.querySelector('.toy');
  toy.classList.add('shake');
  setTimeout(()=>{ clearScreen(); }, 120);
  setTimeout(()=>toy.classList.remove('shake'), 420);
}
document.getElementById('shake').onclick = shakeClear;
document.getElementById('shakeBtn').onclick = shakeClear;
canvas.setAttribute('tabindex','0');
</script>
<script src="../_shared/wacky-buy.js" defer></script>
</body>
</html>
