<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Polyhedral Dice · 111 Wacky Apps</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎲</text></svg>">
<link rel="stylesheet" href="../_shared/wacky.css">
<style>
  .dietype{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  .dbtn{font-family:var(--mono);font-weight:800;cursor:pointer;background:#fff;color:var(--ink);
    border:3px solid var(--ink);border-radius:10px;padding:8px 12px;box-shadow:var(--shadow-sm)}
  .dbtn.on{background:var(--purple);color:#fff}
  .tray{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin:18px 0;min-height:80px}
  .die{width:70px;height:70px;display:flex;align-items:center;justify-content:center;
    font-size:30px;font-weight:900;background:#fff;border:4px solid var(--ink);border-radius:14px;
    box-shadow:var(--shadow-sm);font-family:var(--mono)}
  .die.tumble{animation:tum .6s ease}
  @keyframes tum{0%{transform:rotate(0) scale(.6)}50%{transform:rotate(200deg) scale(1.1)}100%{transform:rotate(360deg) scale(1)}}
  .die.crit{background:var(--cyan);border-color:#0a8}
  .die.fail{background:var(--pink);color:#fff}
  #total{font-size:clamp(30px,9vw,52px);font-weight:900}
  .countrow{display:flex;align-items:center;gap:10px;justify-content:center}
  .countrow button{width:42px;height:42px;font-size:22px}
</style>
</head>
<body>
<div class="wacky-bar">
  <a class="back" href="../../">← all 111</a>
  <span class="title">🎲 Polyhedral Dice</span>
  <span class="spacer"></span>
  <span class="num">#25</span>
</div>
<div class="wrap">
  <div class="card center stack">
    <div class="muted">Roll for initiative, snack choice, or chaos.</div>
    <div class="dietype" id="types"></div>
    <div class="countrow">
      <button class="btn" id="minus">−</button>
      <div><b id="cnt" style="font-size:24px">2</b> dice</div>
      <button class="btn" id="plus">+</button>
    </div>
    <button class="btn pink" id="roll" style="font-size:22px">🎲 ROLL THE DICE</button>
    <div class="tray" id="tray"></div>
    <div id="total">—</div>
    <div class="muted" id="flavor"></div>
  </div>
</div>
<script>
const SIDES=[4,6,8,10,12,20,100];let die=20,count=2;
const types=document.getElementById('types');
SIDES.forEach(s=>{const b=document.createElement('button');b.className='dbtn'+(s===die?' on':'');b.textContent='d'+s;
  b.onclick=()=>{die=s;[...types.children].forEach(c=>c.classList.toggle('on',c===b));};types.appendChild(b);});
const cntEl=document.getElementById('cnt'),tray=document.getElementById('tray'),
  totalEl=document.getElementById('total'),flavor=document.getElementById('flavor');
document.getElementById('plus').onclick=()=>{count=Math.min(12,count+1);cntEl.textContent=count;};
document.getElementById('minus').onclick=()=>{count=Math.max(1,count-1);cntEl.textContent=count;};
let ac;function clack(){try{ac=ac||new(window.AudioContext||window.webkitAudioContext)();
  const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);
  o.type='square';o.frequency.value=120+Math.random()*200;g.gain.setValueAtTime(.12,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+.08);o.start();o.stop(ac.currentTime+.08);}catch(e){}}
function roll(){
  tray.innerHTML='';totalEl.textContent='…';flavor.textContent='';
  let sum=0;const results=[];
  for(let i=0;i<count;i++){const v=1+Math.floor(Math.random()*die);results.push(v);sum+=v;}
  results.forEach((v,i)=>{
    const d=document.createElement('div');d.className='die';d.textContent='…';tray.appendChild(d);
    setTimeout(()=>{
      clack();d.classList.add('tumble');d.textContent=v;
      if(v===die&&die>1)d.classList.add('crit');if(v===1)d.classList.add('fail');
    },120*i+200);
  });
  setTimeout(()=>{
    totalEl.textContent='Total: '+sum;totalEl.classList.remove('pop');void totalEl.offsetWidth;totalEl.classList.add('pop');
    if(die===20&&count===1&&results[0]===20)flavor.textContent='NATURAL 20! The bards will sing of this. 🎉';
    else if(die===20&&count===1&&results[0]===1)flavor.textContent='Natural 1… you trip over your own cloak. 😬';
    else if(results.every(r=>r===results[0]))flavor.textContent='All matching — the dice are in cahoots!';
    else flavor.textContent=count+' × d'+die+'  →  '+results.join(' + ');
  },120*count+300);
}
document.getElementById('roll').onclick=roll;
</script>
<script src="../_shared/wacky-buy.js" defer></script>
</body>
</html>
