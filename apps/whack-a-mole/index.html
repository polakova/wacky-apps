<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Whack-a-Mole · 111 Wacky Apps</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔨</text></svg>">
<link rel="stylesheet" href="../_shared/wacky.css">
<style>
.scorebar{display:flex;justify-content:space-around;gap:10px;margin-bottom:16px}
.scorebar .box{background:#fff;border:3px solid var(--ink);border-radius:12px;
  box-shadow:var(--shadow-sm);padding:8px 14px;text-align:center;flex:1}
.scorebar .lbl{font-family:var(--mono);font-size:11px;opacity:.7;text-transform:uppercase}
.scorebar .val{font-size:26px;font-weight:900}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:420px;margin:0 auto}
.hole{
  aspect-ratio:1/1;background:radial-gradient(ellipse at 50% 80%,#6b4a2b,#3a2616);
  border:3px solid var(--ink);border-radius:50%/40%;box-shadow:var(--shadow-sm);
  display:flex;align-items:flex-end;justify-content:center;overflow:hidden;
  cursor:pointer;position:relative;user-select:none;-webkit-tap-highlight-color:transparent;
}
.mole{font-size:clamp(34px,11vw,56px);transform:translateY(120%);transition:transform .12s cubic-bezier(.3,1.6,.6,1);pointer-events:none;line-height:1}
.hole.up .mole{transform:translateY(8%)}
.hole.bonk .mole{transform:translateY(8%) scale(.7) rotate(-12deg)}
.dirt{position:absolute;bottom:0;left:0;right:0;height:18%;background:#2a1a0e;border-top:3px solid #1a1006}
.bonkfx{position:absolute;top:6%;left:50%;transform:translateX(-50%);font-weight:900;
  font-family:var(--mono);color:var(--yellow);text-shadow:1px 1px 0 var(--ink);
  font-size:20px;opacity:0;pointer-events:none}
.hole.bonk .bonkfx{animation:bonk .5s}
@keyframes bonk{0%{opacity:1;transform:translate(-50%,0) scale(.6)}100%{opacity:0;transform:translate(-50%,-30px) scale(1.3)}}
</style>
</head>
<body>
<div class="wacky-bar">
  <a class="back" href="../../">← all 111</a>
  <span class="title">🔨 Whack-a-Mole</span>
  <span class="spacer"></span>
  <span class="num">#101</span>
</div>
<div class="wrap">
  <p class="center muted">They pop. You bonk. Gently. They're fine, promise. 🐹</p>
  <div class="scorebar">
    <div class="box"><div class="lbl">Score</div><div class="val" id="score">0</div></div>
    <div class="box"><div class="lbl">Time</div><div class="val" id="time">30</div></div>
    <div class="box"><div class="lbl">Best</div><div class="val" id="best">0</div></div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="center" style="margin-top:18px">
    <button class="btn pink" id="startBtn">▶ Start Whacking</button>
  </div>
  <p class="center muted" id="msg"></p>
</div>
<script>
const $=id=>document.getElementById(id);
const grid=$("grid");
const MOLES=["🐹","🦫","🐭","🐿️"];
let holes=[];
for(let i=0;i<9;i++){
  const h=document.createElement("div");h.className="hole";
  h.innerHTML='<span class="bonkfx">BONK!</span><span class="mole"></span><div class="dirt"></div>';
  h.dataset.i=i;
  h.addEventListener("pointerdown",()=>whack(i));
  grid.appendChild(h);holes.push(h);
}
let score=0,time=30,playing=false,best=+(localStorage.getItem("mole_best")||0);
let active=-1,popTimer=null,tick=null,spawnTimer=null,curMole="";
$("best").textContent=best;
let actx=null;
function beep(f,d,type){
  if(!actx)return;const o=actx.createOscillator(),g=actx.createGain();
  o.type=type||"square";o.frequency.value=f;o.connect(g);g.connect(actx.destination);
  g.gain.setValueAtTime(.15,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);
  o.start();o.stop(actx.currentTime+d);
}
function whack(i){
  if(!playing||i!==active)return;
  score++;$("score").textContent=score;
  const h=holes[i];h.classList.add("bonk");
  beep(660,.08,"square");beep(180,.12,"sawtooth");
  active=-1;
  clearTimeout(popTimer);
  setTimeout(()=>{h.classList.remove("up","bonk");h.querySelector(".mole").textContent="";},160);
}
function spawn(){
  if(!playing)return;
  if(active>=0){holes[active].classList.remove("up","bonk");}
  let i;do{i=Math.floor(Math.random()*9);}while(i===active);
  active=i;
  curMole=MOLES[Math.floor(Math.random()*MOLES.length)];
  holes[i].querySelector(".mole").textContent=curMole;
  holes[i].classList.add("up");
  const upMs=Math.max(420,1100-(30-time)*26);
  popTimer=setTimeout(()=>{
    if(active===i){holes[i].classList.remove("up");holes[i].querySelector(".mole").textContent="";active=-1;}
  },upMs);
  const gap=Math.max(280,900-(30-time)*22);
  spawnTimer=setTimeout(spawn,gap+Math.random()*220);
}
function start(){
  if(!actx){try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  if(actx&&actx.state==="suspended")actx.resume();
  clearInterval(tick);clearTimeout(spawnTimer);clearTimeout(popTimer);
  holes.forEach(h=>{h.classList.remove("up","bonk");h.querySelector(".mole").textContent="";});
  score=0;time=30;active=-1;playing=true;
  $("score").textContent=0;$("time").textContent=30;$("msg").textContent="";
  $("startBtn").textContent="🔨 Whack!";
  spawn();
  tick=setInterval(()=>{
    time--;$("time").textContent=time;
    if(time<=0)end();
  },1000);
}
function end(){
  playing=false;clearInterval(tick);clearTimeout(spawnTimer);clearTimeout(popTimer);
  holes.forEach(h=>{h.classList.remove("up","bonk");h.querySelector(".mole").textContent="";});
  active=-1;$("startBtn").textContent="🔁 Play Again";
  beep(523,.15);setTimeout(()=>beep(784,.25),140);
  if(score>best){best=score;localStorage.setItem("mole_best",best);$("best").textContent=best;
    $("msg").textContent="🏆 NEW HIGH SCORE! "+score+" bonks!";}
  else{$("msg").textContent="Time! You scored "+score+". Best is "+best+".";}
}
$("startBtn").onclick=start;
</script>
<script src="../_shared/wacky-buy.js" defer></script>
</body>
</html>
