<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flocking Boids · 111 Wacky Apps</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐦</text></svg>">
<link rel="stylesheet" href="../_shared/wacky.css">
<style>
  #sky{border:4px solid var(--ink);border-radius:14px;box-shadow:var(--shadow);
    background:linear-gradient(#cfe9ff,#eafff8);width:100%;touch-action:none;cursor:none}
</style>
</head>
<body>
<div class="wacky-bar">
  <a class="back" href="../../">← all 111</a>
  <span class="title">🐦 Flocking Boids</span>
  <span class="spacer"></span>
  <span class="num">#58</span>
</div>
<div class="wrap stack">
  <p class="muted center" style="margin:0">A murmuration of tiny birds. Move your pointer to herd them — hold <b>Push</b> to scatter, <b>Pull</b> to gather.</p>
  <canvas id="sky" width="700" height="460"></canvas>
  <div class="row" style="justify-content:center">
    <button class="btn" id="mode">Mode: Pull 🧲</button>
    <button class="btn purple" id="scatter">Scatter!</button>
    <label class="muted">Birds <input id="count" type="range" min="20" max="200" value="90"></label>
  </div>
</div>
<script>
const cv=document.getElementById('sky'),cx=cv.getContext('2d');
let W,H,boids=[],N=90,attract=true;
const mouse={x:-999,y:-999,on:false};
function resize(){const r=cv.getBoundingClientRect();W=cv.width=r.width;H=cv.height=Math.round(r.width*0.66);}
new ResizeObserver(resize).observe(cv);resize();
function mk(){return{x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*2,vy:(Math.random()-.5)*2,h:Math.random()*60+180};}
function build(n){boids=[];for(let i=0;i<n;i++)boids.push(mk());}
build(N);
document.getElementById('count').oninput=e=>{N=+e.target.value;build(N);};
document.getElementById('mode').onclick=e=>{attract=!attract;e.target.textContent='Mode: '+(attract?'Pull 🧲':'Push 💥');};
document.getElementById('scatter').onclick=()=>boids.forEach(b=>{b.vx=(Math.random()-.5)*14;b.vy=(Math.random()-.5)*14;});
function pos(e){const r=cv.getBoundingClientRect(),t=e.touches?e.touches[0]:e;mouse.x=(t.clientX-r.left);mouse.y=(t.clientY-r.top);mouse.on=true;}
['mousemove','touchmove'].forEach(ev=>cv.addEventListener(ev,e=>{pos(e);if(e.touches)e.preventDefault();},{passive:false}));
['mouseleave','touchend'].forEach(ev=>cv.addEventListener(ev,()=>mouse.on=false));
function tick(){
  for(const b of boids){
    let ax=0,ay=0,cxx=0,cyy=0,sx=0,sy=0,n=0;
    for(const o of boids){if(o===b)continue;const dx=o.x-b.x,dy=o.y-b.y,d2=dx*dx+dy*dy;
      if(d2<5000){ax+=o.vx;ay+=o.vy;cxx+=o.x;cyy+=o.y;n++;if(d2<400){sx-=dx;sy-=dy;}}}
    if(n){ax/=n;ay/=n;cxx/=n;cyy/=n;
      b.vx+=(ax-b.vx)*.04+(cxx-b.x)*.0006+sx*.05;
      b.vy+=(ay-b.vy)*.04+(cyy-b.y)*.0006+sy*.05;}
    if(mouse.on){const dx=mouse.x-b.x,dy=mouse.y-b.y,d=Math.hypot(dx,dy)+.01;
      if(d<180){const f=(attract?1:-1)*(180-d)/180*.5;b.vx+=dx/d*f;b.vy+=dy/d*f;}}
    const sp=Math.hypot(b.vx,b.vy),mx=4.2;if(sp>mx){b.vx=b.vx/sp*mx;b.vy=b.vy/sp*mx;}if(sp<1.5){b.vx*=1.1;b.vy*=1.1;}
    b.x+=b.vx;b.y+=b.vy;
    if(b.x<0)b.x+=W;if(b.x>W)b.x-=W;if(b.y<0)b.y+=H;if(b.y>H)b.y-=H;
  }
}
function draw(){
  cx.clearRect(0,0,W,H);
  for(const b of boids){const a=Math.atan2(b.vy,b.vx);
    cx.save();cx.translate(b.x,b.y);cx.rotate(a);
    cx.fillStyle='hsl('+b.h+',70%,45%)';
    cx.beginPath();cx.moveTo(8,0);cx.lineTo(-5,4);cx.lineTo(-2,0);cx.lineTo(-5,-4);cx.closePath();cx.fill();
    cx.restore();}
  if(mouse.on){cx.strokeStyle=attract?'rgba(58,134,255,.5)':'rgba(255,93,162,.6)';cx.lineWidth=2;
    cx.beginPath();cx.arc(mouse.x,mouse.y,12,0,7);cx.stroke();}
}
function loop(){tick();draw();requestAnimationFrame(loop);}loop();
</script>
<script src="../_shared/wacky-buy.js" defer></script>
</body>
</html>
