<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Spirograph · 111 Wacky Apps</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌀</text></svg>">
<link rel="stylesheet" href="../_shared/wacky.css">
<style>
  .stage{background:#15101f;border:4px solid var(--ink);border-radius:18px;
    box-shadow:var(--shadow);overflow:hidden;margin:8px auto;max-width:420px}
  canvas{width:100%;display:block;background:#15101f}
  .ctrls{max-width:420px;margin:14px auto}
  .ctrls label{font-family:var(--mono);font-weight:800;display:flex;align-items:center;gap:10px}
  .ctrls input[type=range]{flex:1}
  .val{font-family:var(--mono);font-weight:900;min-width:34px;text-align:right}
</style>
</head>
<body>
<div class="wacky-bar">
  <a class="back" href="../../">← all 111</a>
  <span class="title">🌀 Spirograph</span>
  <span class="spacer"></span>
  <span class="num">#47</span>
</div>
<div class="wrap center">
  <div class="muted">Hypnotic loops, just like the plastic gear toy. Tweak the gears and hit Draw.</div>
  <div class="stage"><canvas id="c"></canvas></div>
  <div class="ctrls stack">
    <label>R (big gear) <input type="range" id="R" min="40" max="180" value="130"><span class="val" id="Rv">130</span></label>
    <label>r (little gear) <input type="range" id="r" min="10" max="120" value="55"><span class="val" id="rv">55</span></label>
    <label>d (pen offset) <input type="range" id="d" min="5" max="120" value="70"><span class="val" id="dv">70</span></label>
  </div>
  <div class="row" style="justify-content:center">
    <button class="btn pink" id="draw">✏️ Draw</button>
    <button class="btn" id="add">➕ Layer another</button>
    <button class="btn purple" id="clear">🧹 Clear</button>
  </div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const SIZE = 400;
canvas.width = SIZE; canvas.height = SIZE;

function bg(){ ctx.fillStyle='#15101f'; ctx.fillRect(0,0,SIZE,SIZE); }
bg();

const sliders = ['R','r','d'];
sliders.forEach(id=>{
  const s = document.getElementById(id);
  const v = document.getElementById(id+'v');
  s.addEventListener('input', ()=> v.textContent = s.value);
});

function gcd(a,b){ return b? gcd(b, a%b) : a; }
let anim = null;

function randColor(){
  const h = Math.floor(Math.random()*360);
  return `hsl(${h} 90% 62%)`;
}

function draw(){
  if(anim) cancelAnimationFrame(anim);
  let R = +document.getElementById('R').value;
  let r = +document.getElementById('r').value;
  let d = +document.getElementById('d').value;
  if(r === 0) r = 1;
  const cx = SIZE/2, cy = SIZE/2;
  const scale = Math.min(1, (SIZE/2 - 6) / (R - r + d));
  // total turns until the pattern closes
  const turns = r / gcd(R, r);
  const tEnd = Math.PI * 2 * turns;
  const stepsPerFrame = 90;
  const dt = tEnd / Math.max(1200, turns*240);
  let t = 0;
  const color = randColor();
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.4;
  ctx.shadowColor = color;
  ctx.shadowBlur = 6;

  function pt(t){
    const k = (R - r);
    const x = cx + scale*( k*Math.cos(t) + d*Math.cos(k*t/r) );
    const y = cy + scale*( k*Math.sin(t) - d*Math.sin(k*t/r) );
    return [x,y];
  }
  let [px,py] = pt(0);
  ctx.beginPath(); ctx.moveTo(px,py);
  function frame(){
    for(let i=0;i<stepsPerFrame && t<tEnd;i++){
      t += dt;
      const [x,y] = pt(t);
      ctx.lineTo(x,y);
    }
    ctx.stroke();
    ctx.beginPath(); ctx.moveTo(...pt(t));
    if(t < tEnd){ anim = requestAnimationFrame(frame); }
    else { ctx.shadowBlur = 0; }
  }
  anim = requestAnimationFrame(frame);
}

document.getElementById('draw').onclick = ()=>{ bg(); draw(); };
document.getElementById('add').onclick = draw; // layer without clearing
document.getElementById('clear').onclick = ()=>{ if(anim) cancelAnimationFrame(anim); bg(); };
draw();
</script>
<script src="../_shared/wacky-buy.js" defer></script>
</body>
</html>
