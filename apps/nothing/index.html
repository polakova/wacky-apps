<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nothing · 111 Wacky Apps</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚪</text></svg>">
<link rel="stylesheet" href="../_shared/wacky.css">
<style>
  body{background:#f4f0e6;background-image:none}
  .zen{min-height:calc(100vh - 60px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;text-align:center;padding:24px}
  .dot{width:14px;height:14px;border-radius:50%;background:var(--ink);opacity:.25;transition:transform .6s ease}
  .timer{font-family:var(--mono);font-weight:900;font-size:clamp(34px,11vw,72px);letter-spacing:2px}
  .hint{font-size:15px;opacity:.45;max-width:300px}
  .best{opacity:.4;font-family:var(--mono);font-size:13px}
  .flash{color:var(--pink)!important;animation:shake .4s}
</style>
</head>
<body>
<div class="wacky-bar">
  <a class="back" href="../../">← all 111</a>
  <span class="title">⚪ Nothing</span>
  <span class="spacer"></span>
  <span class="num">#89</span>
</div>
<div class="zen">
  <div class="dot" id="dot"></div>
  <div class="timer" id="timer">0.0s</div>
  <div class="hint" id="hint">Do nothing. Don't move. Don't touch. Don't even think about typing.</div>
  <div class="best" id="best"></div>
</div>
<script>
(function(){
  var timer=document.getElementById('timer'),hint=document.getElementById('hint'),
      bestEl=document.getElementById('best'),dot=document.getElementById('dot');
  var start=Date.now(), running=true, grace=true;
  var best=parseFloat(localStorage.getItem('nothing_best')||'0');

  function showBest(){ bestEl.textContent = best>0 ? ('longest nothing: '+best.toFixed(1)+'s') : ''; }
  showBest();

  // grace period so loading the page doesn't instantly reset on the settling mouse
  setTimeout(function(){grace=false;},700);

  var praise=[
    "Beautiful. You are achieving peak nothing.","The void approves.",
    "This is the most productive nothing of your life.","Stillness level: monk.",
    "Even the dot is impressed.","Nothing has never looked so good."
  ];
  var pi=0;

  function loop(){
    if(running){
      var t=(Date.now()-start)/1000;
      timer.textContent=t.toFixed(1)+'s';
      // gentle breathing dot
      var b=1+0.5*Math.sin(Date.now()/700);
      dot.style.transform='scale('+b+')';
      if(t>5 && Math.floor(t)%6===0){ hint.textContent=praise[pi%praise.length]; }
    }
    requestAnimationFrame(loop);
  }
  loop();

  function reset(kind){
    if(grace || !running) {return;}
    var t=(Date.now()-start)/1000;
    if(t>best){ best=t; localStorage.setItem('nothing_best',String(best)); showBest(); }
    running=false;
    timer.textContent=t.toFixed(1)+'s';
    timer.classList.add('flash');
    hint.textContent="You "+kind+". Nothing ruined. You lasted "+t.toFixed(1)+"s.";
    setTimeout(function(){
      timer.classList.remove('flash');
      start=Date.now(); running=true; grace=true;
      setTimeout(function(){grace=false;},500);
      hint.textContent="Begin again. Do nothing. It's harder than it looks.";
    },1400);
  }

  // any interaction resets
  window.addEventListener('mousemove',function(){reset('moved the mouse');});
  window.addEventListener('keydown',function(e){
    // allow the back link to be tabbed/used; but typing resets
    reset('pressed a key');
  });
  document.querySelector('.zen').addEventListener('click',function(){reset('clicked');});
  window.addEventListener('touchstart',function(){reset('tapped');});
  window.addEventListener('wheel',function(){reset('scrolled');});
})();
</script>
<script src="../_shared/wacky-buy.js" defer></script>
</body>
</html>
