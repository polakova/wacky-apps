<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Falling Sand · 111 Wacky Apps</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏳</text></svg>">
<link rel="stylesheet" href="../_shared/wacky.css">
<style>
  #board{border:4px solid var(--ink);border-radius:12px;box-shadow:var(--shadow);
    image-rendering:pixelated;touch-action:none;background:#0b0716;width:100%;cursor:crosshair}
  .swatch{width:46px;height:46px;border:3px solid var(--ink);border-radius:10px;cursor:pointer;
    box-shadow:var(--shadow-sm);transition:transform .05s}
  .swatch.on{transform:translateY(-4px) scale(1.08);outline:3px dashed var(--ink);outline-offset:3px}
  .sand{background:#ffd23f}.water{background:#3a86ff}.wall{background:#5b5266}.eraser{background:#fdf6e3}
</style>
</head>
<body>
<div class="wacky-bar">
  <a class="back" href="../../">← all 111</a>
  <span class="title">⏳ Falling Sand</span>
  <span class="spacer"></span>
  <span class="num">#57</span>
</div>
<div class="wrap stack">
  <p class="muted center" style="margin:0">Draw and watch it tumble. Sand piles, water spreads, walls hold.</p>
  <canvas id="board" width="160" height="200"></canvas>
  <div class="row center" style="justify-content:center">
    <div class="swatch sand on" data-mat="1" title="Sand"></div>
    <div class="swatch water" data-mat="2" title="Water"></div>
    <div class="swatch wall" data-mat="3" title="Wall"></div>
    <div class="swatch eraser" data-mat="0" title="Eraser"></div>
  </div>
  <div class="row" style="justify-content:center">
    <label class="muted">Brush <input id="brush" type="range" min="1" max="8" value="3"></label>
    <button class="btn pink" id="clear">Clear</button>
  </div>
</div>
<script>
const W=160,H=200,cv=document.getElementById('board'),cx=cv.getContext('2d');
const img=cx.createImageData(W,H);
let grid=new Uint8Array(W*H), mat=1, brush=3, drawing=false;
const COL={0:[11,7,22],1:[255,210,63],2:[58,134,255],3:[91,82,102]};
document.querySelectorAll('.swatch').forEach(s=>s.onclick=()=>{
  mat=+s.dataset.mat;document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('on'));s.classList.add('on');
});
document.getElementById('brush').oninput=e=>brush=+e.target.value;
document.getElementById('clear').onclick=()=>grid.fill(0);
function evt(e){const r=cv.getBoundingClientRect(),t=e.touches?e.touches[0]:e;
  return [Math.floor((t.clientX-r.left)/r.width*W),Math.floor((t.clientY-r.top)/r.height*H)];}
function paint(e){const [px,py]=evt(e);
  for(let dy=-brush;dy<=brush;dy++)for(let dx=-brush;dx<=brush;dx++){
    if(dx*dx+dy*dy>brush*brush)continue;const x=px+dx,y=py+dy;
    if(x>=0&&x<W&&y>=0&&y<H){let m=mat;if(m===1&&Math.random()<.15)m=1;grid[y*W+x]=m;}}}
['mousedown','touchstart'].forEach(ev=>cv.addEventListener(ev,e=>{e.preventDefault();drawing=true;paint(e);},{passive:false}));
['mousemove','touchmove'].forEach(ev=>cv.addEventListener(ev,e=>{if(drawing){e.preventDefault();paint(e);}},{passive:false}));
['mouseup','touchend','mouseleave'].forEach(ev=>window.addEventListener(ev,()=>drawing=false));
function swap(a,b){const t=grid[a];grid[a]=grid[b];grid[b]=t;}
function step(){
  for(let y=H-2;y>=0;y--){
    const l2r=Math.random()<.5;
    for(let i=0;i<W;i++){
      const x=l2r?i:W-1-i, idx=y*W+x, m=grid[idx];
      if(m===0||m===3)continue;
      const below=idx+W;
      if(grid[below]===0){swap(idx,below);continue;}
      if(m===2&&grid[below]===1){continue;}
      const dl=(x>0&&grid[below-1]===0), dr=(x<W-1&&grid[below+1]===0);
      if(dl||dr){if(dl&&dr)swap(idx,below+(Math.random()<.5?-1:1));else swap(idx,dl?below-1:below+1);continue;}
      if(m===2){const sl=(x>0&&grid[idx-1]===0),sr=(x<W-1&&grid[idx+1]===0);
        if(sl||sr){if(sl&&sr)swap(idx,idx+(Math.random()<.5?-1:1));else swap(idx,sl?idx-1:idx+1);}}
    }
  }
}
function render(){const d=img.data;
  for(let i=0;i<grid.length;i++){const c=COL[grid[i]],p=i*4;d[p]=c[0];d[p+1]=c[1];d[p+2]=c[2];d[p+3]=255;}
  cx.putImageData(img,0,0);}
function loop(){step();step();render();requestAnimationFrame(loop);}
// little starter pile
for(let x=60;x<100;x++)for(let y=0;y<6;y++)grid[y*W+x]=1;
loop();
</script>
<script src="../_shared/wacky-buy.js" defer></script>
</body>
</html>
