<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Useless Button · 111 Wacky Apps</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔴</text></svg>">
<link rel="stylesheet" href="../_shared/wacky.css">
<style>
  .stage{position:relative;min-height:340px;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .ubtn{
    font-family:var(--mono);font-weight:900;font-size:24px;color:#fff;cursor:pointer;
    background:radial-gradient(circle at 35% 30%,#ff7a8a,#d12c2c 70%);
    border:5px solid #1a1623;border-radius:50%;width:150px;height:150px;
    box-shadow:0 8px 0 #7a1414, var(--shadow-sm);
    transition:transform .18s cubic-bezier(.2,1.6,.4,1), left .18s ease, top .18s ease;
    position:relative;user-select:none;
  }
  .ubtn:active{transform:scale(.94) translateY(4px)}
  .msg{font-size:clamp(18px,4.5vw,26px);font-weight:800;min-height:1.4em}
  .fly{position:absolute;font-size:28px;pointer-events:none;animation:fly 1.1s ease forwards}
  @keyframes fly{to{transform:translateY(-120px) rotate(40deg);opacity:0}}
</style>
</head>
<body>
<div class="wacky-bar">
  <a class="back" href="../../">← all 111</a>
  <span class="title">🔴 The Useless Button</span>
  <span class="spacer"></span>
  <span class="num">#87</span>
</div>
<div class="wrap center">
  <div class="card stack">
    <div class="msg" id="msg">This button does absolutely nothing. Go on. Prove it.</div>
    <div class="stage" id="stage">
      <button class="ubtn" id="btn">PRESS</button>
    </div>
    <div class="row" style="justify-content:center">
      <span class="pill" id="count">Useless presses: 0</span>
      <span class="pill" id="best">Record futility: 0</span>
    </div>
  </div>
</div>
<script>
(function(){
  var btn=document.getElementById('btn'),stage=document.getElementById('stage'),
      msg=document.getElementById('msg'),countEl=document.getElementById('count'),
      bestEl=document.getElementById('best');
  var n=0;
  var best=parseInt(localStorage.getItem('ub_best')||'0',10);
  bestEl.textContent='Record futility: '+best;

  var lines=[
    "Nothing happened. As promised.",
    "Loading nothing... done. Enjoy your nothing.",
    "ERROR 404: Purpose not found.",
    "*button shrugs theatrically*",
    "That did exactly what you'd expect: zilch.",
    "The button considered doing something, then napped.",
    "Achievement unlocked: Still Nothing.",
    "Connecting to the void... void busy. Try later.",
    "It vibrated with importance. Then nothing.",
    "Press registered. Filed under 'who cares'.",
    "A committee reviewed your press and declined.",
    "Almost did something! ...nah.",
    "The nothing is artisanal and locally sourced.",
    "BREAKING: button continues to do nothing.",
    "You pressed a button. A button pressed back. Nothing.",
    "Refund denied. There was no purchase. Just nothing.",
    "Somewhere, a fax machine sighed. Nothing.",
    "Diagnostics complete: working as intended (uselessly)."
  ];
  var actx;
  function blip(f){try{actx=actx||new(window.AudioContext||window.webkitAudioContext)();
    var o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);
    o.type='square';o.frequency.value=f;g.gain.setValueAtTime(.15,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.15);o.start();o.stop(actx.currentTime+.15);}catch(e){}}

  function emoji(e){
    var s=document.createElement('span');s.className='fly';s.textContent=e;
    s.style.left=(40+Math.random()*60)+'%';s.style.top='50%';
    stage.appendChild(s);setTimeout(function(){s.remove();},1100);
  }
  function dodge(){
    var pad=20, maxX=stage.clientWidth-150-pad, maxY=stage.clientHeight-150-pad;
    btn.style.position='absolute';
    btn.style.left=Math.max(pad,Math.random()*maxX)+'px';
    btn.style.top=Math.max(pad,Math.random()*maxY)+'px';
  }

  // some presses trigger special theatrics
  function press(){
    n++; blip(220+Math.random()*120);
    countEl.textContent='Useless presses: '+n;
    if(n>best){best=n;localStorage.setItem('ub_best',String(best));bestEl.textContent='Record futility: '+best;}
    msg.textContent=lines[Math.floor(Math.random()*lines.length)];
    msg.classList.remove('pop');void msg.offsetWidth;msg.classList.add('pop');

    var r=Math.random();
    if(r<0.25){ emoji(['🤷','💨','🙅','😴','📉','🫥'][Math.floor(Math.random()*6)]); }
    if(r>0.6){ dodge(); } // the button flees
    if(n%10===0){ stage.classList.add('shake'); setTimeout(function(){stage.classList.remove('shake');},400);
      msg.textContent="Wow, "+n+" presses of pure nothing. Inspiring."; }
  }

  // dodge on hover sometimes so it's tempting
  btn.addEventListener('mouseenter',function(){ if(n>3 && Math.random()<0.4) dodge(); });
  btn.addEventListener('click',press);
})();
</script>
<script src="../_shared/wacky-buy.js" defer></script>
</body>
</html>
