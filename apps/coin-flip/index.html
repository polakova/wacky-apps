<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Coin Flipper · 111 Wacky Apps</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪙</text></svg>">
<link rel="stylesheet" href="../_shared/wacky.css">
<style>
  .stage{perspective:900px;margin:18px auto;height:200px;display:flex;align-items:center;justify-content:center}
  .coin{width:160px;height:160px;position:relative;transform-style:preserve-3d;transition:transform .1s}
  .coin.flip{animation:fl 2s cubic-bezier(.25,.6,.2,1) forwards}
  @keyframes fl{0%{transform:translateY(0) rotateX(0)}
    30%{transform:translateY(-110px) rotateX(900deg)}
    100%{transform:translateY(0) rotateX(var(--end))}}
  .face{position:absolute;inset:0;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:64px;font-weight:900;backface-visibility:hidden;border:6px solid #8a6d00;
    box-shadow:inset 0 0 0 8px #ffe97a, var(--shadow)}
  .heads{background:radial-gradient(circle at 35% 30%,#ffe97a,#f5b800)}
  .tails{background:radial-gradient(circle at 35% 30%,#ffe97a,#f5b800);transform:rotateX(180deg)}
  #res{font-size:clamp(26px,7vw,40px)}
  .tallybox{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
  .tcard{background:#fff;border:4px solid var(--ink);border-radius:14px;padding:10px 18px;min-width:96px;box-shadow:var(--shadow-sm)}
  .tcard b{font-size:30px;display:block}
</style>
</head>
<body>
<div class="wacky-bar">
  <a class="back" href="../../">← all 111</a>
  <span class="title">🪙 Coin Flipper</span>
  <span class="spacer"></span>
  <span class="num">#24</span>
</div>
<div class="wrap">
  <div class="card center stack">
    <div class="muted">Heads I win, tails you win. Probably fair. Mostly.</div>
    <div class="stage">
      <div class="coin" id="coin">
        <div class="face heads">👑</div>
        <div class="face tails">🦅</div>
      </div>
    </div>
    <div class="output" id="res">Flip me!</div>
    <button class="btn purple" id="flip">FLIP THE COIN</button>
    <div class="tallybox">
      <div class="tcard">Heads<b id="h">0</b></div>
      <div class="tcard">Tails<b id="t">0</b></div>
      <div class="tcard">Streak<b id="s">0</b></div>
    </div>
    <button class="btn" id="reset" style="font-size:14px;padding:8px 14px">reset tally</button>
  </div>
</div>
<script>
const coin=document.getElementById('coin'),res=document.getElementById('res');
let tally=JSON.parse(localStorage.getItem('coinTally')||'{"h":0,"t":0}');
let last=null,streak=0,busy=false;
function paint(){document.getElementById('h').textContent=tally.h;document.getElementById('t').textContent=tally.t;document.getElementById('s').textContent=streak;}
paint();
let ac;function spin(f,t){try{ac=ac||new(window.AudioContext||window.webkitAudioContext)();
  const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);
  o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(.2,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+t);o.start();o.stop(ac.currentTime+t);}catch(e){}}
const QUIPS={heads:["Heads it is, your majesty 👑","Heads! The crown prevails.","Heads — bold and shiny."],
  tails:["Tails! The eagle soars 🦅","Tails it is, wild one.","Tails — fortune flutters down."]};
function flip(){
  if(busy)return;busy=true;res.textContent='…';
  const heads=Math.random()<.5;
  // base 5 full spins (1800deg) + 0 or 180 to land on the right face
  const end=1800+(heads?0:180);
  coin.style.setProperty('--end',end+'deg');
  coin.classList.remove('flip');void coin.offsetWidth;coin.classList.add('flip');
  spin(300,.1);setTimeout(()=>spin(420,.1),700);setTimeout(()=>spin(550,.1),1300);
  setTimeout(()=>{
    spin(700,.18);
    const k=heads?'heads':'tails';
    res.textContent=QUIPS[k][Math.floor(Math.random()*3)];
    res.classList.remove('pop');void res.offsetWidth;res.classList.add('pop');
    tally[heads?'h':'t']++;
    if(last===k)streak++;else streak=1;last=k;
    localStorage.setItem('coinTally',JSON.stringify(tally));paint();
    busy=false;
  },2000);
}
document.getElementById('flip').onclick=flip;
document.getElementById('reset').onclick=()=>{tally={h:0,t:0};streak=0;last=null;localStorage.setItem('coinTally',JSON.stringify(tally));paint();res.textContent='Flip me!';};
</script>
<script src="../_shared/wacky-buy.js" defer></script>
</body>
</html>
