<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reaction Time · 111 Wacky Apps</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<link rel="stylesheet" href="../_shared/wacky.css">
<style>
.pad{
  border:4px solid var(--ink);border-radius:18px;box-shadow:var(--shadow);
  min-height:46vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:24px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;
  transition:background .05s;color:#fff;
}
.pad .emo{font-size:clamp(48px,16vw,90px);line-height:1}
.pad .txt{font-size:clamp(20px,5vw,30px);font-weight:900;margin-top:10px;text-shadow:0 2px 8px rgba(0,0,0,.3)}
.pad .sub{font-family:var(--mono);font-size:14px;opacity:.85;margin-top:6px}
.state-idle{background:linear-gradient(135deg,#3a86ff,#7b2ff7)}
.state-wait{background:linear-gradient(135deg,#b21f1f,#ff5da2)}
.state-go{background:linear-gradient(135deg,#16a34a,#16e0bd)}
.state-early{background:linear-gradient(135deg,#7b2ff7,#1a1623)}
.state-result{background:linear-gradient(135deg,#ff7a45,#ffd23f);color:var(--ink)}
.stats{display:flex;justify-content:space-around;margin-top:16px;gap:10px}
.stats .b{background:#fff;border:3px solid var(--ink);border-radius:12px;box-shadow:var(--shadow-sm);padding:8px 14px;text-align:center;flex:1}
.stats .l{font-family:var(--mono);font-size:11px;opacity:.7;text-transform:uppercase}
.stats .v{font-size:24px;font-weight:900}
</style>
</head>
<body>
<div class="wacky-bar">
  <a class="back" href="../../">← all 111</a>
  <span class="title">⚡ Reaction Time</span>
  <span class="spacer"></span>
  <span class="num">#102</span>
</div>
<div class="wrap">
  <p class="center muted">Wait for green, then tap like a caffeinated cat. Don't jump the gun. 🐱</p>
  <div class="pad state-idle" id="pad">
    <div class="emo" id="emo">⚡</div>
    <div class="txt" id="txt">Tap to start</div>
    <div class="sub" id="sub">Tap when the screen turns GREEN</div>
  </div>
  <div class="stats">
    <div class="b"><div class="l">Last</div><div class="v" id="last">—</div></div>
    <div class="b"><div class="l">Best</div><div class="v" id="best">—</div></div>
    <div class="b"><div class="l">Avg (5)</div><div class="v" id="avg">—</div></div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const pad=$("pad");
let state="idle",goTime=0,timer=null;
let best=localStorage.getItem("react_best");best=best?+best:null;
let hist=JSON.parse(localStorage.getItem("react_hist")||"[]");
let actx=null;
function beep(f,d,t){if(!actx)return;const o=actx.createOscillator(),g=actx.createGain();o.type=t||"sine";o.frequency.value=f;o.connect(g);g.connect(actx.destination);g.gain.setValueAtTime(.18,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);o.start();o.stop(actx.currentTime+d);}
function refresh(){
  $("best").textContent=best!=null?best+" ms":"—";
  if(hist.length){const a=Math.round(hist.reduce((x,y)=>x+y,0)/hist.length);$("avg").textContent=a+" ms";}
  else $("avg").textContent="—";
}
function setState(s){pad.className="pad state-"+s;state=s;}
function rank(ms){
  if(ms<180)return"🚀 Superhuman!";
  if(ms<230)return"⚡ Lightning fast";
  if(ms<300)return"😎 Quick draw";
  if(ms<400)return"👍 Pretty good";
  if(ms<550)return"🙂 Not bad";
  return"🐌 Take your time, champ";
}
function arm(){
  setState("wait");
  $("emo").textContent="🔴";$("txt").textContent="Wait for green…";$("sub").textContent="Don't tap yet!";
  const delay=1200+Math.random()*2800;
  timer=setTimeout(()=>{
    setState("go");
    $("emo").textContent="🟢";$("txt").textContent="TAP NOW!";$("sub").textContent="";
    goTime=performance.now();
    beep(880,.08);
  },delay);
}
function handle(){
  if(!actx){try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  if(actx&&actx.state==="suspended")actx.resume();
  if(state==="idle"||state==="result"||state==="early"){arm();return;}
  if(state==="wait"){
    clearTimeout(timer);setState("early");
    $("emo").textContent="🙈";$("txt").textContent="Too early!";$("sub").textContent="+250ms penalty. Tap to retry.";
    beep(140,.2,"sawtooth");
    const pen=250;$("last").textContent=pen+" ms (early)";
    return;
  }
  if(state==="go"){
    const ms=Math.round(performance.now()-goTime);
    setState("result");
    $("emo").textContent="⚡";$("txt").textContent=ms+" ms";$("sub").textContent=rank(ms)+" — tap to go again";
    $("last").textContent=ms+" ms";
    beep(660,.1);
    hist.push(ms);if(hist.length>5)hist.shift();
    localStorage.setItem("react_hist",JSON.stringify(hist));
    if(best==null||ms<best){best=ms;localStorage.setItem("react_best",best);$("sub").textContent="🏆 New best! "+rank(ms)+" — tap again";}
    refresh();
  }
}
pad.addEventListener("pointerdown",e=>{e.preventDefault();handle();});
document.addEventListener("keydown",e=>{if(e.code==="Space"){e.preventDefault();handle();}});
refresh();
</script>
<script src="../_shared/wacky-buy.js" defer></script>
</body>
</html>
