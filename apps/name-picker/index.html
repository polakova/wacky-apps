<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Raffle Picker · 111 Wacky Apps</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎟️</text></svg>">
<link rel="stylesheet" href="../_shared/wacky.css">
<style>
  .display{font-size:clamp(30px,9vw,56px);font-weight:900;min-height:1.3em;
    background:#fff;border:5px solid var(--ink);border-radius:16px;padding:24px 12px;
    box-shadow:var(--shadow);word-break:break-word}
  .display.win{background:var(--yellow);animation:pop .4s}
  textarea{min-height:150px}
  #cv{position:fixed;inset:0;pointer-events:none;z-index:300}
  .pillrow{display:flex;flex-wrap:wrap;gap:4px;justify-content:center}
</style>
</head>
<body>
<div class="wacky-bar">
  <a class="back" href="../../">← all 111</a>
  <span class="title">🎟️ Raffle Picker</span>
  <span class="spacer"></span>
  <span class="num">#26</span>
</div>
<canvas id="cv"></canvas>
<div class="wrap stack">
  <div class="card center stack">
    <div class="display" id="disp">🎟️ Ready!</div>
    <div class="muted" id="status">Add names below, then draw a lucky winner.</div>
    <div class="row" style="justify-content:center">
      <button class="btn pink" id="draw" style="font-size:22px">🎉 DRAW!</button>
      <button class="btn" id="remove" disabled>Remove winner</button>
    </div>
  </div>
  <div class="card stack">
    <label class="muted">Names — one per line:</label>
    <textarea id="names">Aurora
Benedikt
Clementine
Dashiell
Esperanza
Fitzgerald
Guadalupe
Hieronymus</textarea>
    <div class="muted"><span id="cnt">0</span> entries in the hat 🎩</div>
  </div>
</div>
<script>
const ta=document.getElementById('names'),disp=document.getElementById('disp'),
  status=document.getElementById('status'),cntEl=document.getElementById('cnt'),
  removeBtn=document.getElementById('remove');
let lastWinner=null,busy=false;
function names(){return ta.value.split('\n').map(s=>s.trim()).filter(Boolean);}
function refresh(){cntEl.textContent=names().length;}
ta.addEventListener('input',refresh);refresh();
let ac;function tick(f){try{ac=ac||new(window.AudioContext||window.webkitAudioContext)();
  const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);
  o.type='square';o.frequency.value=f;g.gain.setValueAtTime(.1,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+.05);o.start();o.stop(ac.currentTime+.05);}catch(e){}}
const WIN=["🏆 Winner: ","🎉 Congrats, ","⭐ It's ","🥳 Step right up, "];
function draw(){
  if(busy)return;const list=names();
  if(list.length===0){status.textContent='The hat is empty! Add some names.';disp.textContent='🤷';return;}
  if(list.length===1){land(list[0]);return;}
  busy=true;removeBtn.disabled=true;disp.classList.remove('win');status.textContent='Drawing…';
  let speed=45,elapsed=0;const target=1600+Math.random()*900;
  (function cyc(){
    disp.textContent=list[Math.floor(Math.random()*list.length)];tick(500+Math.random()*300);
    elapsed+=speed;speed*=1.06;
    if(elapsed<target)setTimeout(cyc,speed);
    else land(list[Math.floor(Math.random()*list.length)]);
  })();
}
function land(name){
  lastWinner=name;disp.textContent=WIN[Math.floor(Math.random()*WIN.length)]+name;
  disp.classList.add('win');status.textContent='Drumroll complete!';
  tick(700);setTimeout(()=>tick(900),90);setTimeout(()=>tick(1100),180);
  confetti();busy=false;removeBtn.disabled=false;
}
document.getElementById('draw').onclick=draw;
removeBtn.onclick=()=>{if(!lastWinner)return;ta.value=names().filter(n=>n!==lastWinner).join('\n');lastWinner=null;removeBtn.disabled=true;refresh();status.textContent='Winner removed from the hat.';};
const cc=document.getElementById('cv'),cx=cc.getContext('2d');let parts=[];const C=['#ff5da2','#7b2ff7','#16e0bd','#ffd23f','#ff7a45','#3a86ff'];
function rs(){cc.width=innerWidth;cc.height=innerHeight;}rs();addEventListener('resize',rs);
function confetti(){for(let i=0;i<140;i++)parts.push({x:Math.random()*innerWidth,y:-20,vx:(Math.random()-.5)*6,vy:Math.random()*4+2,c:C[i%C.length],r:Math.random()*8+4,a:1});if(parts.length<=140)anim();}
function anim(){cx.clearRect(0,0,cc.width,cc.height);parts.forEach(p=>{p.y+=p.vy;p.x+=p.vx;p.vy+=.12;p.a-=.008;cx.globalAlpha=Math.max(0,p.a);cx.fillStyle=p.c;cx.fillRect(p.x,p.y,p.r,p.r);});parts=parts.filter(p=>p.a>0&&p.y<cc.height+40);if(parts.length)requestAnimationFrame(anim);else cx.clearRect(0,0,cc.width,cc.height);}
</script>
<script src="../_shared/wacky-buy.js" defer></script>
</body>
</html>
