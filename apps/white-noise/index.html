<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Noise Mixer · 111 Wacky Apps</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌧️</text></svg>">
<link rel="stylesheet" href="../_shared/wacky.css">
<style>
  body{background:#0e1726;background-image:radial-gradient(rgba(255,255,255,.06) 1px,transparent 1px);color:#e8f0ff}
  .mixer{background:#15233b;border:4px solid #0a1120;border-radius:18px;box-shadow:6px 6px 0 #060a13;padding:22px}
  .ch{display:flex;align-items:center;gap:14px;margin:16px 0}
  .ch .emoji{font-size:30px;width:44px;text-align:center}
  .ch .nm{flex:0 0 84px;font-weight:900;font-family:var(--mono)}
  .ch input[type=range]{flex:1;accent-color:var(--cyan);height:26px}
  .ch .val{flex:0 0 44px;text-align:right;font-family:var(--mono);font-size:13px;opacity:.8}
  .lit{box-shadow:0 0 14px var(--cyan)}
  h1.big{color:#fff}
  .sub{color:#9fc7ff}
</style>
</head>
<body>
<div class="wacky-bar">
  <a class="back" href="../../">← all 111</a>
  <span class="title">🌧️ Noise Mixer</span>
  <span class="spacer"></span>
  <span class="num">#71</span>
</div>
<div class="wrap">
  <div class="center stack">
    <h1 class="big">🌧️ Noise Mixer</h1>
    <p class="sub muted">Stack white, pink &amp; rainfall. Drift off, or just vibe. 😌</p>
  </div>
  <div class="mixer" id="mixer" style="margin-top:18px">
    <div class="ch" data-k="white"><span class="emoji">📻</span><span class="nm">White</span><input type="range" min="0" max="100" value="0"><span class="val">0%</span></div>
    <div class="ch" data-k="pink"><span class="emoji">🌸</span><span class="nm">Pink</span><input type="range" min="0" max="100" value="0"><span class="val">0%</span></div>
    <div class="ch" data-k="rain"><span class="emoji">🌧️</span><span class="nm">Rain</span><input type="range" min="0" max="100" value="0"><span class="val">0%</span></div>
  </div>
  <div class="row center" style="justify-content:center;margin-top:20px">
    <button class="btn" id="play">▶ Play</button>
    <button class="btn purple" id="rainPreset">😴 Rainy night</button>
  </div>
  <p class="center muted" style="margin-top:14px">Tip: a little pink + lots of rain = cozy.</p>
</div>
<script>
let ac, master, started=false, playing=false;
const chans={};
const buf={};

function makeNoiseBuffer(type){
  const len=ac.sampleRate*2;
  const b=ac.createBuffer(1,len,ac.sampleRate);
  const d=b.getChannelData(0);
  if(type==='white'){
    for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
  } else { // pink (Voss-ish)
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for(let i=0;i<len;i++){
      const w=Math.random()*2-1;
      b0=0.99886*b0+w*0.0555179;b1=0.99332*b1+w*0.0750759;b2=0.96900*b2+w*0.1538520;
      b3=0.86650*b3+w*0.3104856;b4=0.55000*b4+w*0.5329522;b5=-0.7616*b5-w*0.0168980;
      d[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11;b6=w*0.115926;
    }
  }
  return b;
}

function build(){
  ac=new (window.AudioContext||window.webkitAudioContext)();
  master=ac.createGain(); master.gain.value=0.9; master.connect(ac.destination);
  buf.white=makeNoiseBuffer('white');
  buf.pink=makeNoiseBuffer('pink');

  // white & pink: looping buffer sources -> gain
  ['white','pink'].forEach(k=>{
    const src=ac.createBufferSource(); src.buffer=buf[k]; src.loop=true;
    const g=ac.createGain(); g.gain.value=0;
    src.connect(g); g.connect(master); src.start();
    chans[k]={gain:g};
  });

  // rain: filtered white noise + slow LFO amplitude swells = rainfall
  const rsrc=ac.createBufferSource(); rsrc.buffer=buf.white; rsrc.loop=true;
  const hp=ac.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=600;
  const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=8000;
  const rg=ac.createGain(); rg.gain.value=0;
  rsrc.connect(hp); hp.connect(lp); lp.connect(rg); rg.connect(master);
  // gentle swell
  const lfo=ac.createOscillator(); lfo.frequency.value=0.13;
  const lfoG=ac.createGain(); lfoG.gain.value=0.0; // set when channel level set
  lfo.connect(lfoG); lfoG.connect(rg.gain); lfo.start(); rsrc.start();
  chans.rain={gain:rg,swell:lfoG};
  started=true;
}

function setLevel(k,v){
  if(!chans[k]) return;
  const lin=(v/100)*(v/100); // perceptual-ish
  chans[k].gain.gain.setTargetAtTime(lin*0.6, ac.currentTime, .15);
  if(k==='rain'&&chans.rain.swell) chans.rain.swell.gain.setTargetAtTime(lin*0.18, ac.currentTime, .2);
}

document.querySelectorAll('.ch').forEach(row=>{
  const k=row.dataset.k, sl=row.querySelector('input'), val=row.querySelector('.val');
  const lite=()=>row.querySelector('.emoji').classList.toggle('lit', +sl.value>3 && playing);
  sl.addEventListener('input',()=>{
    val.textContent=sl.value+'%';
    if(started&&playing) setLevel(k,+sl.value);
    lite();
  });
});

const playBtn=document.getElementById('play');
function refreshAll(){document.querySelectorAll('.ch').forEach(r=>{
  const k=r.dataset.k,sl=r.querySelector('input');
  setLevel(k, playing?+sl.value:0);
  r.querySelector('.emoji').classList.toggle('lit', +sl.value>3 && playing);
});}
playBtn.addEventListener('click',async()=>{
  if(!started) build();
  if(ac.state==='suspended') await ac.resume();
  playing=!playing;
  playBtn.textContent=playing?'⏸ Stop':'▶ Play';
  playBtn.classList.toggle('pink',playing);
  refreshAll();
});

document.getElementById('rainPreset').addEventListener('click',async()=>{
  const set={white:0,pink:18,rain:80};
  document.querySelectorAll('.ch').forEach(r=>{
    const sl=r.querySelector('input');sl.value=set[r.dataset.k];
    r.querySelector('.val').textContent=sl.value+'%';
  });
  if(!started) build();
  if(ac.state==='suspended') await ac.resume();
  if(!playing){playing=true;playBtn.textContent='⏸ Stop';playBtn.classList.add('pink');}
  refreshAll();
});
</script>
<script src="../_shared/wacky-buy.js" defer></script>
</body>
</html>
