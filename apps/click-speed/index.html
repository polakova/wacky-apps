<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Click Speed Test · 111 Wacky Apps</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖱️</text></svg>">
<link rel="stylesheet" href="../_shared/wacky.css">
<style>
.pad{
  border:4px solid var(--ink);border-radius:20px;box-shadow:var(--shadow);
  min-height:44vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:24px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;
  background:linear-gradient(135deg,var(--cyan),var(--blue));color:#fff;transition:transform .04s;
}
.pad:active{transform:scale(.985)}
.pad.live{background:linear-gradient(135deg,var(--pink),var(--orange))}
.pad.done{background:linear-gradient(135deg,#ffd23f,#ff7a45);color:var(--ink)}
.pad .emo{font-size:clamp(50px,18vw,100px);line-height:1}
.pad .big2{font-size:clamp(40px,13vw,72px);font-weight:900;line-height:1;text-shadow:0 3px 10px rgba(0,0,0,.25)}
.pad .txt{font-size:clamp(18px,4.5vw,26px);font-weight:900;margin-top:8px}
.pad .sub{font-family:var(--mono);font-size:14px;opacity:.9;margin-top:6px}
.bar{height:14px;background:#fff;border:3px solid var(--ink);border-radius:999px;overflow:hidden;margin-top:14px}
.bar>i{display:block;height:100%;width:100%;background:var(--purple);transition:width .1s linear}
.stats{display:flex;justify-content:space-around;margin-top:14px;gap:10px}
.stats .b{background:#fff;border:3px solid var(--ink);border-radius:12px;box-shadow:var(--shadow-sm);padding:8px 14px;text-align:center;flex:1}
.stats .l{font-family:var(--mono);font-size:11px;opacity:.7;text-transform:uppercase}
.stats .v{font-size:22px;font-weight:900}
</style>
</head>
<body>
<div class="wacky-bar">
  <a class="back" href="../../">← all 111</a>
  <span class="title">🖱️ Click Speed Test</span>
  <span class="spacer"></span>
  <span class="num">#103</span>
</div>
<div class="wrap">
  <p class="center muted">5 seconds. Click like the snooze button at 6am. 💥</p>
  <div class="pad" id="pad">
    <div class="emo" id="emo">🖱️</div>
    <div class="txt" id="txt">Tap here to start</div>
    <div class="sub" id="sub">5-second clicking frenzy</div>
  </div>
  <div class="bar"><i id="bar"></i></div>
  <div class="stats">
    <div class="b"><div class="l">Best CPS</div><div class="v" id="best">—</div></div>
    <div class="b"><div class="l">Last CPS</div><div class="v" id="lastcps">—</div></div>
  </div>
  <div class="center" style="margin-top:14px"><button class="btn purple" id="reset">🔁 Reset</button></div>
</div>
<script>
const $=id=>document.getElementById(id);
const pad=$("pad"),bar=$("bar");
const DUR=5000;
let state="idle",clicks=0,start=0,raf=null,endT=0;
let best=localStorage.getItem("cps_best");best=best?+best:null;
let actx=null;
function tick(f,d){if(!actx)return;const o=actx.createOscillator(),g=actx.createGain();o.type="square";o.frequency.value=f;o.connect(g);g.connect(actx.destination);g.gain.setValueAtTime(.07,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+(d||.04));o.start();o.stop(actx.currentTime+(d||.04));}
function refresh(){$("best").textContent=best!=null?best.toFixed(1):"—";}
function rank(cps){
  if(cps>=11)return"🏆 Inhuman clicker";
  if(cps>=9)return"🚀 Turbo fingers";
  if(cps>=7)return"⚡ Speed demon";
  if(cps>=5)return"😎 Solid clicker";
  if(cps>=3)return"👍 Casual tapper";
  return"🐢 Zen mode";
}
function begin(){
  if(!actx){try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  if(actx&&actx.state==="suspended")actx.resume();
  state="live";clicks=0;start=performance.now();endT=start+DUR;
  pad.className="pad live";
  $("emo").textContent="🔥";$("txt").textContent="0";$("sub").textContent="CLICK CLICK CLICK!";
  loop();
}
function loop(){
  const now=performance.now();
  const left=Math.max(0,endT-now);
  bar.style.width=(left/DUR*100)+"%";
  if(left<=0){finish();return;}
  raf=requestAnimationFrame(loop);
}
function finish(){
  state="done";cancelAnimationFrame(raf);bar.style.width="0%";
  const cps=clicks/(DUR/1000);
  pad.className="pad done";
  $("emo").textContent="🎉";$("txt").textContent=clicks+" clicks";
  $("sub").textContent=cps.toFixed(1)+" CPS · "+rank(cps)+" — tap to retry";
  $("lastcps").textContent=cps.toFixed(1);
  tick(523,.12);setTimeout(()=>tick(784,.18),120);
  if(best==null||cps>best){best=cps;localStorage.setItem("cps_best",best);$("sub").textContent=cps.toFixed(1)+" CPS · 🏆 NEW BEST! Tap to retry";}
  refresh();
}
pad.addEventListener("pointerdown",e=>{
  e.preventDefault();
  if(state==="live"){clicks++;$("txt").textContent=clicks;tick(700+Math.min(clicks*6,600),.03);}
  else{begin();}
});
$("reset").onclick=()=>{
  cancelAnimationFrame(raf);state="idle";bar.style.width="100%";
  pad.className="pad";$("emo").textContent="🖱️";$("txt").textContent="Tap here to start";$("sub").textContent="5-second clicking frenzy";
};
bar.style.width="100%";refresh();
</script>
<script src="../_shared/wacky-buy.js" defer></script>
</body>
</html>
