<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kaleidoscope · 111 Wacky Apps</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔭</text></svg>">
<link rel="stylesheet" href="../_shared/wacky.css">
<style>
  body{background:#0c0814}
  .wrap{max-width:760px}
  .screen{background:#000;border:4px solid var(--ink);border-radius:18px;box-shadow:var(--shadow);
    overflow:hidden;touch-action:none}
  canvas{cursor:crosshair}
  .panel{display:flex;gap:14px;flex-wrap:wrap;align-items:center;justify-content:center;
    background:#fff;border:4px solid var(--ink);border-radius:18px;box-shadow:var(--shadow);
    padding:14px 18px;margin-top:16px}
  .panel label{font-family:var(--mono);font-weight:800}
  .sub{color:#d9bfff;text-align:center;font-family:var(--mono);margin:0 0 14px}
</style>
</head>
<body>
<div class="wacky-bar">
  <a class="back" href="../../">← all 111</a>
  <span class="title">🔭 Kaleidoscope</span>
  <span class="spacer"></span>
  <span class="num">#53</span>
</div>
<div class="wrap">
  <p class="sub">drag across the glass · symmetry does the rest</p>
  <div class="screen"><canvas id="c"></canvas></div>
  <div class="panel">
    <label>mirrors</label>
    <select id="seg">
      <option>6</option><option selected>8</option><option>12</option><option>16</option><option>24</option>
    </select>
    <button class="btn pink" id="clear">🧹 clear</button>
    <button class="btn blue" id="auto">🎲 auto-doodle</button>
  </div>
</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W,H,cx,cy;
function size(){
  const s=Math.min(700,document.querySelector('.wrap').clientWidth);
  W=cv.width=s;H=cv.height=s;cx=W/2;cy=H/2;clear();
}
function clear(){ctx.fillStyle="#000";ctx.fillRect(0,0,W,H);}
addEventListener('resize',size);size();
let hue=0,last=null;
const seg=()=>+document.getElementById('seg').value;
function draw(x,y,px,py){
  const n=seg();hue=(hue+3)%360;
  const lx=x-cx,ly=y-cy,lpx=px-cx,lpy=py-cy;
  ctx.lineCap="round";
  for(let i=0;i<n;i++){
    const a=(Math.PI*2/n)*i;const co=Math.cos(a),si=Math.sin(a);
    const rx=lx*co-ly*si, ry=lx*si+ly*co;
    const rpx=lpx*co-lpy*si, rpy=lpx*si+lpy*co;
    ctx.strokeStyle="hsl("+hue+",95%,60%)";ctx.lineWidth=4;
    ctx.beginPath();ctx.moveTo(cx+rpx,cy+rpy);ctx.lineTo(cx+rx,cy+ry);ctx.stroke();
    // mirrored reflection for true kaleidoscope
    ctx.beginPath();ctx.moveTo(cx-rpx,cy+rpy);ctx.lineTo(cx-rx,cy+ry);ctx.stroke();
  }
}
function pos(e){const r=cv.getBoundingClientRect();const t=e.touches?e.touches[0]:e;
  return [(t.clientX-r.left)*(W/r.width),(t.clientY-r.top)*(H/r.height)];}
let down=false;
function start(e){down=true;last=pos(e);}
function move(e){if(!down)return;e.preventDefault?.();const p=pos(e);draw(p[0],p[1],last[0],last[1]);last=p;}
function end(){down=false;last=null;}
cv.addEventListener('mousedown',start);addEventListener('mousemove',move);addEventListener('mouseup',end);
cv.addEventListener('touchstart',e=>{e.preventDefault();start(e);},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();move(e);},{passive:false});
cv.addEventListener('touchend',end);
document.getElementById('clear').onclick=clear;
// auto-doodle: a wandering point traces a lissajous-ish path
let autoOn=false,t=0;
document.getElementById('auto').onclick=function(){autoOn=!autoOn;this.textContent=autoOn?'⏹ stop':'🎲 auto-doodle';};
function loop(){
  if(autoOn){
    t+=0.05;
    const x=cx+Math.cos(t*1.3)*W*0.32+Math.sin(t*0.7)*W*0.1;
    const y=cy+Math.sin(t*1.1)*H*0.32+Math.cos(t*0.5)*H*0.1;
    if(loop.px!=null)draw(x,y,loop.px,loop.py);
    loop.px=x;loop.py=y;
  } else {loop.px=null;}
  requestAnimationFrame(loop);
}
loop();
</script>
<script src="../_shared/wacky-buy.js" defer></script>
</body>
</html>
