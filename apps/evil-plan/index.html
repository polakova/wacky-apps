<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Evil Plan Generator · 111 Wacky Apps</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦹</text></svg>">
<link rel="stylesheet" href="../_shared/wacky.css">
<style>
  body.lair{background:#0a0710;background-image:radial-gradient(circle at 50% 0%,rgba(123,47,247,.25),transparent 55%),radial-gradient(rgba(255,255,255,.04) 1px,transparent 1px);background-size:auto,22px 22px;color:#eee}
  .lair-card{background:#140d22;border:4px solid #2a1c44;border-radius:18px;
    box-shadow:0 0 40px rgba(123,47,247,.35),var(--shadow-sm);padding:26px 22px;color:#eee;position:relative;overflow:hidden}
  .lair-card::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% -10%,rgba(123,47,247,.18),transparent 60%);pointer-events:none}
  .villainname{font-weight:900;font-size:clamp(24px,6vw,40px);text-align:center;color:var(--cyan);
    text-shadow:0 0 14px rgba(22,224,189,.6);letter-spacing:1px;line-height:1.1}
  .subtitle{text-align:center;font-family:var(--mono);font-size:12px;letter-spacing:3px;color:#9a7fd0;margin-top:4px}
  .steps{list-style:none;padding:0;margin:22px 0 6px;counter-reset:evil}
  .steps li{counter-increment:evil;background:#1c1233;border:2px solid #3a2660;border-radius:12px;
    padding:14px 14px 14px 54px;margin-bottom:12px;position:relative;font-weight:700;font-size:clamp(15px,4vw,19px);line-height:1.3}
  .steps li::before{content:counter(evil);position:absolute;left:12px;top:50%;transform:translateY(-50%);
    width:30px;height:30px;background:var(--pink);color:#0a0710;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:900;box-shadow:0 0 10px rgba(255,93,162,.7)}
  .laugh{text-align:center;font-style:italic;color:var(--orange);font-weight:800;margin-top:6px}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(40px);
    background:#000;color:var(--cyan);font-family:var(--mono);padding:10px 18px;border-radius:10px;
    opacity:0;transition:.3s;pointer-events:none;z-index:99;border:1px solid var(--cyan)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .lair .muted{color:#8a7aa8;opacity:1}
</style>
</head>
<body class="lair">
<div class="wacky-bar">
  <a class="back" href="../../">← all 111</a>
  <span class="title">🦹 Evil Plan Generator</span>
  <span class="spacer"></span>
  <span class="num">#6</span>
</div>
<div class="wrap stack">
  <div class="lair-card">
    <div class="villainname" id="vname">DOCTOR DESPICABLE</div>
    <div class="subtitle">▼ MASTER PLAN · TOP SECRET ▼</div>
    <ol class="steps" id="steps"></ol>
    <div class="laugh" id="laugh">MWAHAHAHA!</div>
  </div>
  <div class="row center" style="justify-content:center">
    <button class="btn pink" id="gen">😈 Scheme</button>
    <button class="btn purple" id="copy">📋 Copy plan</button>
  </div>
  <div class="muted center">Cartoonishly evil. Suitable for plotting against pizza, naps, and Mondays only.</div>
</div>
<div class="toast" id="toast">Plan copied to your lair.</div>
<script>
const titles=["Doctor","Baron","Professor","Madame","Count","Sir","Captain","Lord","The Notorious","Mistress"];
const epithets=["Despicable","Von Snarl","Mischief","Doomwhistle","Grumbletoe","Nefario","Sourpuss","Cackle",
  "Bleakington","Sneer","Murk","Gloomsworth","Spite","Razzle","Vexington","Snide"];
const step1=["First, I shall steal every left sock in the city",
  "First, I shall replace all the world's coffee with decaf",
  "First, I shall train an army of judgmental geese",
  "First, I shall hide the TV remotes of the entire nation",
  "First, I shall reroute every escalator into a loop",
  "First, I shall corner the global supply of bubble wrap",
  "First, I shall teach pigeons to deliver passive-aggressive notes",
  "First, I shall make every pen run out at the worst moment",
  "First, I shall replace all elevator music with kazoo solos",
  "First, I shall steal the last slice of every pizza",
  "First, I shall set every clock 7 minutes fast",
  "First, I shall unionize the world's houseplants",
  "First, I shall hoard all the matching tupperware lids",
  "First, I shall give every dog the ability to send emails",
  "First, I shall tangle every pair of earbuds simultaneously"];
const step2=["Then, using my Laser of Mild Inconvenience, I shall hold the snooze button hostage",
  "Then I shall broadcast my embarrassing childhood nickname to control the masses",
  "Then I shall flood the markets with one-ply everything",
  "Then I shall make all weekends exactly four minutes long",
  "Then I shall convince everyone that Tuesday is now Monday",
  "Then I shall replace all stop signs with riddles",
  "Then I shall deploy the dreaded Glitter Cannon of No Return",
  "Then I shall make every chair just slightly too wobbly",
  "Then I shall encrypt the world's wifi behind a single sock puppet",
  "Then I shall fill every shaker with exactly the wrong seasoning",
  "Then I shall make autocorrect 11% more chaotic",
  "Then I shall hide one shoe from every pair on Earth",
  "Then I shall make all phone chargers 2 centimeters too short",
  "Then I shall replace elevator buttons with mystery surprises",
  "Then I shall make every printer jam in protest"];
const step3=["and FINALLY, the world shall be mine — or at least mildly annoyed!",
  "and FINALLY, I shall demand the entire planet learn my interpretive dance!",
  "and FINALLY, I shall rename Wednesday after myself!",
  "and FINALLY, all shall bow to my superior parking skills!",
  "and FINALLY, I shall control the universe's last working stapler!",
  "and FINALLY, everyone must address me as Supreme Snack Overlord!",
  "and FINALLY, I shall be crowned Emperor of All Leftovers!",
  "and FINALLY, the planet shall run on MY chaotic playlist!",
  "and FINALLY, I shall claim the comfiest spot on every couch!",
  "and FINALLY, no nap shall happen without my permission!",
  "and FINALLY, I shall be the sole keeper of the good pens!",
  "and FINALLY, the world will admit I was right about the thermostat!",
  "and FINALLY, all Mondays shall answer to ME!",
  "and FINALLY, I shall own the rights to the word 'moist'!",
  "and FINALLY, total domination... after a quick snack break!"];
const laughs=["MWAHAHAHA!","HEH HEH HEH...","NYEHEHE!","BWAHAHA!","*villainous chuckle*","KA-CACKLE!","MUAHAHA!"];
const pick=a=>a[Math.floor(Math.random()*a.length)];
const vname=document.getElementById('vname'),steps=document.getElementById('steps'),laugh=document.getElementById('laugh');
let plan="";
function gen(){
  vname.textContent=(pick(titles)+" "+pick(epithets)).toUpperCase();
  const s1=pick(step1),s2=pick(step2),s3=pick(step3);
  steps.innerHTML=[s1,s2,s3].map(s=>`<li>${s}.</li>`).join("");
  laugh.textContent=pick(laughs);
  plan=vname.textContent+"'s Plan:\n1) "+s1+".\n2) "+s2+".\n3) "+s3;
  const card=document.querySelector('.lair-card');
  card.classList.remove('pop');void card.offsetWidth;card.classList.add('pop');
}
document.getElementById('gen').onclick=gen;
const toast=document.getElementById('toast');
document.getElementById('copy').onclick=async()=>{
  try{await navigator.clipboard.writeText(plan);}
  catch(e){const ta=document.createElement('textarea');ta.value=plan;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();}
  toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1400);
};
gen();
</script>
<script src="../_shared/wacky-buy.js" defer></script>
</body>
</html>
