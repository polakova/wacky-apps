<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Compliment Cannon · 111 Wacky Apps</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💖</text></svg>">
<link rel="stylesheet" href="../_shared/wacky.css">
<style>
  .warm{background:linear-gradient(135deg,#ff9a9e 0%,#fecfef 45%,#fbc2eb 100%);
    border:4px solid var(--ink);border-radius:22px;box-shadow:var(--shadow);
    padding:26px;text-align:center;position:relative;overflow:hidden}
  .cannon{font-size:60px;display:inline-block;transition:transform .12s}
  .firing{animation:fire .35s}
  @keyframes fire{0%{transform:scale(1) rotate(0)}40%{transform:scale(1.25) rotate(-8deg)}100%{transform:scale(1) rotate(0)}}
  .msg{font-size:clamp(22px,5.5vw,34px);font-weight:900;color:#7a1f4b;
    min-height:2.4em;display:flex;align-items:center;justify-content:center;
    text-shadow:2px 2px 0 #fff;margin:14px 0}
  canvas#cf{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:60}
  .sub{font-weight:800;color:#7a1f4b}
  .heart{position:absolute;font-size:22px;animation:floatup 2.2s ease-out forwards;pointer-events:none}
  @keyframes floatup{to{transform:translateY(-180px) scale(1.6);opacity:0}}
</style>
</head>
<body>
<div class="wacky-bar">
  <a class="back" href="../../">← all 111</a>
  <span class="title">💖 Compliment Cannon</span>
  <span class="spacer"></span>
  <span class="num">#9</span>
</div>
<canvas id="cf"></canvas>
<div class="wrap">
  <div class="warm">
    <div class="cannon" id="cannon">💝</div>
    <p class="sub">Loaded with 100% pure niceness. Aim at self.</p>
    <div class="msg" id="msg">Ready when you are. 💗</div>
    <div class="row center" style="justify-content:center">
      <button class="btn pink" id="fire">💥 FIRE!</button>
      <button class="btn purple" id="copy" style="display:none">📋 Copy that</button>
    </div>
    <p class="muted" style="color:#7a1f4b;margin-top:14px" id="count"></p>
  </div>
</div>
<script>
const c=[
 "You are someone's favorite person to see.",
 "Your laugh is genuinely contagious.",
 "The world is measurably brighter with you in it.",
 "You make hard things look easy and easy things look fun.",
 "Future-you is so proud of present-you.",
 "Your kindness leaves fingerprints on everything you touch.",
 "You're the human equivalent of a warm cup of cocoa.",
 "People feel safer just being near you.",
 "Your brain is a wonderful place to visit.",
 "You handle chaos with surprising grace.",
 "Somewhere, a plant is alive because you remembered to water it. Hero.",
 "You give the best 'you've got this' energy.",
 "Your heart is roughly three sizes too big, in the best way.",
 "You'd be the first person picked for any team that mattered.",
 "The way you care about small things is a superpower.",
 "You make ordinary Tuesdays feel a little magical.",
 "Your existence is a net positive for the universe.",
 "You're allowed to be both a masterpiece and a work in progress.",
 "Your patience deserves its own award ceremony.",
 "You light up rooms you don't even know you walked into.",
 "Your curiosity makes everyone around you smarter.",
 "You are exactly enough, precisely as you are.",
 "The good in you outweighs anything you worry about.",
 "You're proof that gentle people are the strongest."
];
const msg=document.getElementById('msg'),fire=document.getElementById('fire'),
  copy=document.getElementById('copy'),cannon=document.getElementById('cannon'),
  countEl=document.getElementById('count'),warm=document.querySelector('.warm');
let last=-1,cur="";
let fired=+(localStorage.getItem('complimentsFired')||0);
function showCount(){countEl.textContent="💖 "+fired+" compliments launched";}
showCount();

const cv=document.getElementById('cf'),cx=cv.getContext('2d');let parts=[];
function size(){cv.width=innerWidth;cv.height=innerHeight;}size();addEventListener('resize',size);
const cols=['#ff5da2','#7b2ff7','#ffd23f','#16e0bd','#ff7a45','#3a86ff','#ff9a9e'];
function confetti(){
  for(let i=0;i<90;i++)parts.push({x:cv.width/2,y:cv.height*0.4,
    vx:(Math.random()-0.5)*16,vy:Math.random()*-14-4,
    g:0.4,s:6+Math.random()*7,c:cols[i%cols.length],r:Math.random()*6,vr:(Math.random()-.5)*.4,life:1});
}
function loop(){
  cx.clearRect(0,0,cv.width,cv.height);
  parts.forEach(p=>{p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;p.life-=0.008;
    cx.save();cx.translate(p.x,p.y);cx.rotate(p.r);cx.globalAlpha=Math.max(0,p.life);
    cx.fillStyle=p.c;cx.fillRect(-p.s/2,-p.s/2,p.s,p.s);cx.restore();});
  parts=parts.filter(p=>p.life>0&&p.y<cv.height+40);
  requestAnimationFrame(loop);
}
loop();

let ac;
function chime(){
  try{ac=ac||new (window.AudioContext||window.webkitAudioContext)();
    [523,659,784,1047].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.value=f;
      const t=ac.currentTime+i*0.07;g.gain.setValueAtTime(0.16,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.4);o.start(t);o.stop(t+0.42);});
  }catch(e){}
}
function floatHeart(){
  const h=document.createElement('span');h.className='heart';
  h.textContent=['💖','💕','💗','💓','✨'][Math.floor(Math.random()*5)];
  h.style.left=(20+Math.random()*60)+'%';h.style.bottom='80px';
  warm.appendChild(h);setTimeout(()=>h.remove(),2200);
}
function doFire(){
  let i;do{i=Math.floor(Math.random()*c.length)}while(i===last&&c.length>1);
  last=i;cur=c[i];
  msg.textContent=cur;msg.classList.remove('pop');void msg.offsetWidth;msg.classList.add('pop');
  cannon.classList.remove('firing');void cannon.offsetWidth;cannon.classList.add('firing');
  copy.style.display="";confetti();chime();
  for(let k=0;k<5;k++)setTimeout(floatHeart,k*120);
  fired++;localStorage.setItem('complimentsFired',fired);showCount();
}
fire.addEventListener('click',doFire);
copy.addEventListener('click',()=>{
  const done=()=>{const o=copy.textContent;copy.textContent="✅ Copied!";setTimeout(()=>copy.textContent=o,1200);};
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(cur).then(done).catch(()=>{});}
  else{const t=document.createElement('textarea');t.value=cur;document.body.appendChild(t);t.select();
    try{document.execCommand('copy')}catch(e){}t.remove();done();}
});
</script>
<script src="../_shared/wacky-buy.js" defer></script>
</body>
</html>
