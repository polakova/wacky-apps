<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Click Fireworks · 111 Wacky Apps</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎆</text></svg>">
<link rel="stylesheet" href="../_shared/wacky.css">
<style>
  body{background:#05060f}
  .wrap{max-width:920px}
  .screen{position:relative;background:linear-gradient(#040616,#0b1030 70%,#16204a);
    border:4px solid var(--ink);border-radius:18px;box-shadow:var(--shadow);overflow:hidden}
  canvas{cursor:crosshair}
  .hint{position:absolute;top:10px;left:0;right:0;text-align:center;color:#ffd23f;
    font-family:var(--mono);font-weight:800;pointer-events:none;text-shadow:0 0 10px #000}
  .sub{color:#ffd23f;text-align:center;font-family:var(--mono);margin:0 0 14px}
  .count{position:absolute;bottom:10px;right:14px;color:#fff;font-family:var(--mono);opacity:.8}
</style>
</head>
<body>
<div class="wacky-bar">
  <a class="back" href="../../">← all 111</a>
  <span class="title">🎆 Click Fireworks</span>
  <span class="spacer"></span>
  <span class="num">#51</span>
</div>
<div class="wrap">
  <p class="sub">tap the night sky · every burst is a tiny celebration</p>
  <div class="screen">
    <canvas id="c"></canvas>
    <div class="hint" id="hint">click / tap anywhere ✨</div>
    <div class="count" id="count">bursts: 0</div>
  </div>
</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W,H,stars=[];
function size(){
  W=cv.width=Math.min(900,document.querySelector('.wrap').clientWidth);
  H=cv.height=Math.min(580,window.innerHeight*0.66);
  stars=[];for(let i=0;i<70;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.3+0.2,t:Math.random()*6});
}
addEventListener('resize',size);size();
let parts=[],bursts=0;
function burst(x,y){
  const hue=Math.floor(Math.random()*360),n=50+Math.floor(Math.random()*40);
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=Math.random()*4.5+1;
    parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,
      hue:hue+(Math.random()*40-20),size:Math.random()*2+1.5});
  }
  bursts++;document.getElementById('count').textContent='bursts: '+bursts;
}
function pt(e){
  const r=cv.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;
  burst((t.clientX-r.left)*(W/r.width),(t.clientY-r.top)*(H/r.height));
  document.getElementById('hint').style.display='none';
}
cv.addEventListener('mousedown',pt);
cv.addEventListener('touchstart',e=>{e.preventDefault();pt(e);},{passive:false});
function frame(){
  ctx.fillStyle="rgba(4,6,18,0.22)";ctx.fillRect(0,0,W,H);
  // twinkling stars
  for(const s of stars){s.t+=0.03;const tw=0.5+0.5*Math.sin(s.t);
    ctx.fillStyle="rgba(255,255,255,"+(tw*0.8+0.1)+")";
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,7);ctx.fill();}
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];p.vy+=0.045;p.vx*=0.99;p.vy*=0.99;
    p.x+=p.vx;p.y+=p.vy;p.life-=0.012;
    if(p.life<=0){parts.splice(i,1);continue;}
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle="hsl("+p.hue+",100%,"+(55+p.life*15)+"%)";
    ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,7);ctx.fill();
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(frame);
}
frame();
// a welcome volley
setTimeout(()=>{burst(W*0.3,H*0.4);},300);
setTimeout(()=>{burst(W*0.65,H*0.3);},700);
</script>
<script src="../_shared/wacky-buy.js" defer></script>
</body>
</html>
