<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sci-Fi Planet Namer · 111 Wacky Apps</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪐</text></svg>">
<link rel="stylesheet" href="../_shared/wacky.css">
<style>
  body.space{background:#05060f;background-image:none;overflow-x:hidden}
  #stars{position:fixed;inset:0;z-index:-1}
  .obs{background:rgba(15,18,40,.82);border:4px solid #5fd3ff;border-radius:18px;
    box-shadow:6px 6px 0 #0a1530,0 0 40px rgba(95,211,255,.35);
    padding:28px;text-align:center;color:#dff3ff;backdrop-filter:blur(2px)}
  .planet{font-size:64px;display:inline-block;filter:drop-shadow(0 0 16px #5fd3ff)}
  .spin{animation:spin 6s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .pname{font-family:var(--mono);font-weight:900;
    font-size:clamp(28px,8vw,52px);letter-spacing:1px;margin:14px 0 6px;
    color:#fff;text-shadow:0 0 14px #5fd3ff;word-break:break-word}
  .fact{font-size:clamp(15px,4vw,20px);font-weight:600;color:#bfe6ff;
    min-height:2.4em;line-height:1.4;margin:8px 0}
  .coords{font-family:var(--mono);font-size:12px;color:#7fb8d8;letter-spacing:1px}
  .scan{background:#5fd3ff;color:#05121f;border-color:#0a1530}
  .scan:hover{background:#9be8ff}
</style>
</head>
<body class="space">
<canvas id="stars"></canvas>
<div class="wacky-bar">
  <a class="back" href="../../">← all 111</a>
  <span class="title">🪐 Sci-Fi Planet Namer</span>
  <span class="spacer"></span>
  <span class="num">#14</span>
</div>
<div class="wrap">
  <div class="obs">
    <p style="font-weight:800;margin:0 0 8px;color:#9be8ff">🔭 Deep Space Catalog Terminal</p>
    <span class="planet" id="planet">🪐</span>
    <div class="pname" id="pname">Awaiting Scan…</div>
    <div class="coords" id="coords">SECTOR ▓▓▓ · DISTANCE ▓▓ ly</div>
    <div class="fact" id="fact">Point the telescope and press SCAN to discover a new world.</div>
    <div class="row center" style="justify-content:center;margin-top:8px">
      <button class="btn scan" id="gen">🛰️ SCAN deep space</button>
      <button class="btn purple" id="copy">📋 Copy</button>
    </div>
    <p class="muted" style="color:#7fb8d8;margin-top:14px" id="count"></p>
  </div>
</div>
<script>
const cv=document.getElementById('stars'),sx=cv.getContext('2d');let stars=[];
function size(){cv.width=innerWidth;cv.height=innerHeight;
  stars=Array.from({length:140},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height,
    r:Math.random()*1.6+0.3,t:Math.random()*Math.PI*2,s:0.5+Math.random()}));}
size();addEventListener('resize',size);
function twinkle(){
  sx.clearRect(0,0,cv.width,cv.height);
  stars.forEach(st=>{st.t+=0.04*st.s;const a=0.4+Math.abs(Math.sin(st.t))*0.6;
    sx.beginPath();sx.fillStyle="rgba(255,255,255,"+a+")";
    sx.arc(st.x,st.y,st.r,0,Math.PI*2);sx.fill();});
  requestAnimationFrame(twinkle);
}
twinkle();

const pre=["Zorb","Krell","Xan","Vortex","Nyx","Quor","Blarg","Thal","Zeph","Mor","Glax","Vren","Drax","Plith","Cyga","Orbex","Wex","Jorvis","Klyn","Ar","Veld","Skarn"];
const mid=["la","ax","oon","ith","or","uvi","een","arn","ux","oba","iri","yle","ax","onn","essa","ub"];
const fact=[
 "rains sideways diamonds every third Tuesday",
 "where one day lasts a polite 4 minutes",
 "is entirely covered in luminous purple moss",
 "where the oceans are made of room-temperature tea",
 "hosts the galaxy's loudest, calmest thunderstorms",
 "where gravity gently reverses at lunchtime",
 "is orbited by 14 moons that all hum in harmony",
 "where the sand is soft, warm, and faintly minty",
 "smells permanently of fresh bread, source unknown",
 "where shadows wander off and come back later",
 "is home to crystals that whisper old gossip",
 "where it snows confetti during eclipses",
 "has rings made of slowly drifting umbrellas",
 "where every echo replies with encouragement",
 "where the sunsets last a full, glorious week",
 "is inhabited only by extremely punctual jellyfish",
 "where mountains float a polite meter off the ground",
 "where rivers flow uphill out of sheer stubbornness",
 "has two suns that take turns and never argue",
 "where the rocks are warm and surprisingly good at chess"
];
const planets=["🪐","🌍","🌎","🌏","🔵","🟣","🟠","🟢","🌕","🟤"];
const sectors=["ANDROMEDA-9","HELIX VOID","CASSIOPEIA RIM","ORION DRIFT","NEBULA-7","PERSEUS ARM","DELTA QUADRANT","WHISPER GALAXY"];
const pname=document.getElementById('pname'),fEl=document.getElementById('fact'),
  coords=document.getElementById('coords'),gen=document.getElementById('gen'),
  copy=document.getElementById('copy'),planet=document.getElementById('planet'),
  countEl=document.getElementById('count');
let cur={n:"Awaiting Scan…",f:"",c:""};
let found=+(localStorage.getItem('planetsFound')||0);
function showCount(){countEl.textContent="🌌 "+found+" worlds catalogued";}
showCount();
let ac;
function ping(){
  try{ac=ac||new (window.AudioContext||window.webkitAudioContext)();
    [880,1100,1320].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.value=f;
      const t=ac.currentTime+i*0.08;g.gain.setValueAtTime(0.08,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.3);o.start(t);o.stop(t+0.32);});
  }catch(e){}
}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function gn(){
  let nm=pick(pre)+pick(mid);
  if(Math.random()<0.5) nm+=pick(mid);
  nm=nm.charAt(0).toUpperCase()+nm.slice(1).toLowerCase();
  const designation=nm+"-"+(Math.floor(Math.random()*99)+1)+pick(["b","c","d","e","f"]);
  cur={n:designation,
    f:"A world that "+pick(fact)+".",
    c:"SECTOR "+pick(sectors)+" · DISTANCE "+(Math.floor(Math.random()*900)+10)+" ly"};
  pname.textContent=designation;fEl.textContent=cur.f;coords.textContent=cur.c;
  planet.textContent=pick(planets);
  pname.classList.remove('pop');void pname.offsetWidth;pname.classList.add('pop');
  planet.classList.add('spin');
  ping();
  found++;localStorage.setItem('planetsFound',found);showCount();
}
gen.addEventListener('click',gn);
copy.addEventListener('click',()=>{
  const txt=cur.n+" — "+cur.f+" ("+cur.c+")";
  const done=()=>{const o=copy.textContent;copy.textContent="✅ Copied!";setTimeout(()=>copy.textContent=o,1200);};
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(done).catch(()=>{});}
  else{const t=document.createElement('textarea');t.value=txt;document.body.appendChild(t);t.select();
    try{document.execCommand('copy')}catch(e){}t.remove();done();}
});
</script>
<script src="../_shared/wacky-buy.js" defer></script>
</body>
</html>
