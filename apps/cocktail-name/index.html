<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fake Cocktail Names · 111 Wacky Apps</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍸</text></svg>">
<link rel="stylesheet" href="../_shared/wacky.css">
<style>
  body.spk{background:#120d08;background-image:radial-gradient(#2e2114 1px,transparent 1px)}
  .menu{background:#1c140c;border:4px solid #c9a24a;border-radius:10px;
    box-shadow:6px 6px 0 #000,inset 0 0 0 2px #4a3a1c;
    padding:28px;color:#f4e7c8;text-align:center;
    background-image:repeating-linear-gradient(180deg,rgba(255,255,255,.015) 0 2px,transparent 2px 4px)}
  .deco{color:#c9a24a;letter-spacing:6px;font-size:18px}
  .head{font-family:var(--mono);letter-spacing:3px;color:#c9a24a;font-size:13px;margin:6px 0 2px}
  .glass{font-size:50px;margin:6px 0}
  .cname{font-family:Georgia,'Times New Roman',serif;font-weight:700;font-style:italic;
    font-size:clamp(26px,6.5vw,42px);color:#f7e9c0;margin:8px 0;line-height:1.1;
    text-shadow:0 1px 0 #000}
  .ing{text-align:left;max-width:340px;margin:14px auto;font-family:Georgia,serif;color:#e6d3a0}
  .ing li{margin:7px 0;border-bottom:1px dotted #5a4626;padding-bottom:6px;list-style:none}
  .ing li::before{content:"❧ ";color:#c9a24a}
  .price{font-family:var(--mono);color:#c9a24a;font-weight:800;margin-top:6px}
  .gild{background:#c9a24a;color:#1c140c;border-color:#1c140c}
  .gild:hover{background:#e0bd6a}
</style>
</head>
<body class="spk">
<div class="wacky-bar">
  <a class="back" href="../../">← all 111</a>
  <span class="title">🍸 Fake Cocktail Names</span>
  <span class="spacer"></span>
  <span class="num">#13</span>
</div>
<div class="wrap">
  <div class="menu">
    <div class="deco">◆ ◆ ◆</div>
    <div class="head">THE VELVET PASSWORD · EST. WHENEVER</div>
    <div class="glass" id="glass">🍸</div>
    <div class="cname" id="cname">The House Mystery</div>
    <ul class="ing" id="ing"><li>Press the button to consult the bartender</li></ul>
    <div class="price" id="price"></div>
    <div class="row center" style="justify-content:center;margin-top:14px">
      <button class="btn gild" id="gen">🍹 Pour me something</button>
      <button class="btn purple" id="copy">📋 Copy menu</button>
    </div>
  </div>
</div>
<script>
const adj=["Velvet","Midnight","Gilded","Whispering","Smoked","Crimson","Forbidden","Moonlit","Bitter","Dapper","Electric","Last","Silken","Sundown","Reverent","Wayward","Marbled","Tipsy","Golden","Hushed"];
const noun=["Rascal","Cartographer","Pelican","Heirloom","Mirage","Confession","Saboteur","Lullaby","Bandit","Cathedral","Postcard","Marmalade","Reverie","Stowaway","Comet","Apothecary","Sonnet","Tempest","Locket","Wallflower"];
const base=["aged rye whisper","sun-bruised gin","barrel-tired rum","velvet vermouth","midnight mezcal","clarified moonbeam","slow brandy","cold-pressed cognac","heirloom bourbon"];
const mod=["a single sigh of elderflower","three reluctant drops of bitters","muddled regret","hand-pressed thunder","a whisper of smoked citrus","artisanal fog","ethically-sourced sparkle","one brave juniper berry","tears of a chili pepper","cold-brewed nostalgia","a rumor of rosemary","lightly toasted ambition"];
const garnish=["garnished with a tiny existential question","served with a twist of lemon and irony","crowned with a candied storm cloud","finished with an edible monocle","rimmed with stardust and salt","topped with a single, judgmental olive","misted with second thoughts","served in a glass that's seen things","adorned with a sprig of mischief"];
const glasses=["🍸","🍹","🥃","🍷","🍾","🥂","🧉"];
const cname=document.getElementById('cname'),ing=document.getElementById('ing'),
  price=document.getElementById('price'),gen=document.getElementById('gen'),
  copy=document.getElementById('copy'),glass=document.getElementById('glass');
let cur={n:"The House Mystery",lines:[],p:""};
let ac;
function clink(){
  try{ac=ac||new (window.AudioContext||window.webkitAudioContext)();
    [1320,1760].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.value=f;
      const t=ac.currentTime+i*0.05;g.gain.setValueAtTime(0.1,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.5);o.start(t);o.stop(t+0.52);});
  }catch(e){}
}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function gn(){
  const nm="The "+pick(adj)+" "+pick(noun);
  const lines=[pick(base),pick(mod)];
  if(Math.random()<0.6) lines.push(pick(mod));
  lines.push(pick(garnish));
  const dollars="$".repeat(Math.floor(Math.random()*3)+2);
  cur={n:nm,lines:lines,p:dollars+"  ·  serves 1 sophisticate"};
  cname.textContent=nm;
  ing.innerHTML="";lines.forEach(l=>{const li=document.createElement('li');li.textContent=l;ing.appendChild(li);});
  price.textContent=cur.p;
  glass.textContent=pick(glasses);
  [cname,glass].forEach(el=>{el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');});
  clink();
}
gen.addEventListener('click',gn);
copy.addEventListener('click',()=>{
  const txt=cur.n+"\n"+cur.lines.map(l=>"• "+l).join("\n")+"\n"+cur.p;
  const done=()=>{const o=copy.textContent;copy.textContent="✅ Copied!";setTimeout(()=>copy.textContent=o,1200);};
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(done).catch(()=>{});}
  else{const t=document.createElement('textarea');t.value=txt;document.body.appendChild(t);t.select();
    try{document.execCommand('copy')}catch(e){}t.remove();done();}
});
</script>
<script src="../_shared/wacky-buy.js" defer></script>
</body>
</html>
