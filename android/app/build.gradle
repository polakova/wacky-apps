import groovy.json.JsonSlurper

plugins {
    id 'com.android.application'
}

// One product flavor per Wacky App, generated from ../../apps.json. A single
// `gradle assembleDebug` then configures + compiles ONCE and packages every
// app's APK as its own flavor variant. Assets/icon for each flavor live in
// src/<flavor>/ (filled in by the CI prep step before the build).
def apps = new JsonSlurper().parse(file("${rootDir}/../apps.json"))
def flavorOf = { slug -> slug.replaceAll("-", "") }

android {
    namespace 'com.wackyapps.app'
    compileSdk 34

    defaultConfig {
        minSdk 23
        targetSdk 34
        versionCode 1
        versionName '1.0'
    }

    flavorDimensions += "app"
    productFlavors {
        apps.each { a ->
            def fn = flavorOf(a.slug)
            create(fn) {
                dimension "app"
                applicationId "com.wackyapps.${fn}"
                resValue "string", "app_name", a.title.replaceAll("'", "")
            }
        }
        // the whole-collection app
        create("all111wacky") {
            dimension "app"
            applicationId "com.wackyapps.all111"
            resValue "string", "app_name", "111 Wacky Apps"
        }
    }

    buildTypes {
        debug {
            // debug-signed = installable by sideloading
        }
    }

    lint {
        abortOnError false
        checkReleaseBuilds false
    }
}
