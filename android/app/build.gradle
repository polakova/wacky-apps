plugins {
    id 'com.android.application'
}

// Each app is the SAME wrapper; only these change per build (passed via -P...):
//   -PappId=com.wackyapps.<slug>     unique package so apps coexist on one phone
//   -PappName="App Title"            launcher label
def appId   = project.findProperty('appId')   ?: 'com.wackyapps.all111'
def appName = project.findProperty('appName') ?: '111 Wacky Apps'

android {
    namespace 'com.wackyapps.app'
    compileSdk 34

    defaultConfig {
        applicationId appId
        minSdk 23
        targetSdk 34
        versionCode 1
        versionName '1.0'
        resValue 'string', 'app_name', appName
    }

    buildTypes {
        debug {
            // debug-signed = installable by sideloading (Settings will ask to allow it)
        }
    }

    lint {
        abortOnError false
        checkReleaseBuilds false
    }

    // assets/www is filled in per build (one app, or the whole collection)
    sourceSets {
        main {
            assets.srcDirs = ['src/main/assets']
        }
    }
}
