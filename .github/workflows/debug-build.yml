name: Debug one APK

# Temporary diagnostic: build ONE app verbosely, time-boxed, to find why
# gradle assembleDebug hangs. Runs only when the push commit says 'dbg-apk'
# (or via manual dispatch). Delete once the main build works.
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  dbg:
    if: contains(github.event.head_commit.message, 'dbg-apk') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: android-actions/setup-android@v3
      - name: Accept licenses + ensure SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" >/dev/null
      - uses: gradle/actions/setup-gradle@v4
        with: { gradle-version: '8.7' }
      - name: Python + font
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-color-emoji
          python3 -m pip install --quiet pillow
      - name: Assets
        run: python3 build.py && python3 build_downloads.py
      - name: Build ONE app verbosely (time-boxed 10 min)
        run: |
          WWW=android/app/src/main/assets/www; rm -rf $WWW; mkdir -p $WWW
          cp download/excuse-generator.html "$WWW/index.html"
          python3 android/make_icon.py excuse-generator "🙈" 001 android/app/src/main/res
          cd android
          echo "=== gradle version ==="; gradle --version
          echo "=== assembleDebug (timeout 600s) ==="
          set +e
          timeout 600 gradle assembleDebug --no-daemon --stacktrace --console=plain \
            -PappId=com.wackyapps.excusegenerator -PappName="Excuse Machine" 2>&1 | tail -150
          echo "=== gradle exit: ${PIPESTATUS[0]} (124 = timed out/hung) ==="
          ls -R app/build/outputs 2>/dev/null || echo "no outputs"
