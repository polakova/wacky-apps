name: Build Wacky App APKs

# Wraps every Wacky App (and one "all 111" collection) in an Android WebView
# and publishes the APKs to the "apks" Release for download after payment.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'apps.json'
      - 'android/**'
      - 'build.py'
      - 'build_downloads.py'
      - '.github/workflows/build-apks.yml'

concurrency:
  group: build-apks
  cancel-in-progress: true

permissions:
  contents: write   # needed to create/update the Release

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Install Python + emoji font (for icons)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-color-emoji
          python3 -m pip install --quiet pillow

      - name: Build site assets (standalone files + offline all-in-one)
        run: |
          python3 build.py
          python3 build_downloads.py

      - name: Build all APKs
        run: |
          set -euo pipefail
          mkdir -p out
          WWW=android/app/src/main/assets/www

          # tab-separated manifest: id, slug, emoji, sanitized title
          python3 - > /tmp/manifest.tsv <<'PY'
          import json
          for a in json.load(open("apps.json")):
              title = a["title"].replace("'", "").replace("\t", " ")
              print(f'{a["id"]}\t{a["slug"]}\t{a["emoji"]}\t{title}')
          PY

          total=$(wc -l < /tmp/manifest.tsv)
          n=0
          while IFS=$'\t' read -r id slug emoji title; do
            n=$((n+1))
            appid="com.wackyapps.$(printf '%s' "$slug" | tr -cd 'a-z0-9')"
            printf '[%d/%d] %s -> %s\n' "$n" "$total" "$slug" "$appid"
            rm -rf "$WWW"; mkdir -p "$WWW"
            cp "download/${slug}.html" "$WWW/index.html"
            python3 android/make_icon.py "$slug" "$emoji" "$(printf '%03d' "$id")" android/app/src/main/res
            ( cd android && gradle -q --console=plain assembleDebug -PappId="$appid" -PappName="$title" )
            cp android/app/build/outputs/apk/debug/app-debug.apk "out/${slug}.apk"
          done < /tmp/manifest.tsv

          # all-in-one collection
          echo "Building all-in-one collection APK..."
          rm -rf "$WWW"; mkdir -p "$WWW"
          cp -r download/allinone/. "$WWW/"
          python3 android/make_icon.py "__all__" "🤪" "111" android/app/src/main/res
          ( cd android && gradle -q --console=plain assembleDebug -PappId="com.wackyapps.all111" -PappName="111 Wacky Apps" )
          cp android/app/build/outputs/apk/debug/app-debug.apk "out/all-111-wacky-apps.apk"

          echo "Built $(ls out/*.apk | wc -l) APKs:"
          ls -lh out | tail -n +2 | awk '{print $5, $9}' | head

      - name: Publish APKs to the "apks" Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apks
          name: "📱 Wacky Apps — installable APKs"
          body: "Auto-built Android APKs for all 111 Wacky Apps + the all-in-one collection. Sideload-friendly (debug-signed)."
          files: out/*.apk
          fail_on_unmatched_files: true
