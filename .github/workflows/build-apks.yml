name: Build Wacky App APKs

# Wraps every Wacky App (and one "all 111" collection) in an Android WebView.
# ONE Gradle build with 112 product flavors: configure + compile once, then
# package each app's APK. Published to the "apks" Release for download.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'apps.json'
      - 'android/**'
      - 'build.py'
      - 'build_downloads.py'
      - '.github/workflows/build-apks.yml'

concurrency:
  group: build-apks
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages + accept licenses
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" >/dev/null

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Install Python + emoji font (for icons)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-color-emoji
          python3 -m pip install --quiet pillow

      - name: Build site assets (standalone files + offline all-in-one)
        run: |
          python3 build.py
          python3 build_downloads.py

      - name: Stage per-flavor assets + icons
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os, shutil, subprocess
          apps = json.load(open("apps.json"))
          base = "android/app/src"
          def flavor(slug): return slug.replace("-", "")
          def stage(fn, www_src, emoji, label):
              d = os.path.join(base, fn)
              shutil.rmtree(d, ignore_errors=True)
              os.makedirs(os.path.join(d, "assets", "www"), exist_ok=True)
              if os.path.isdir(www_src):
                  shutil.copytree(www_src, os.path.join(d, "assets", "www"), dirs_exist_ok=True)
              else:
                  shutil.copy(www_src, os.path.join(d, "assets", "www", "index.html"))
              subprocess.run(["python3", "android/make_icon.py", fn, emoji, label,
                              os.path.join(d, "res")], check=True)
          for a in apps:
              stage(flavor(a["slug"]), f"download/{a['slug']}.html", a["emoji"], f"{a['id']:03d}")
          stage("all111wacky", "download/allinone", "🤪", "111")
          print("staged", len(apps) + 1, "flavors")
          PY

      - name: Build all APKs (single Gradle invocation)
        run: |
          cd android
          gradle --no-daemon --console=plain assembleDebug

      - name: Collect APKs
        run: |
          set -euo pipefail
          mkdir -p out
          python3 - <<'PY'
          import json, os, shutil, glob
          apps = json.load(open("apps.json"))
          def flavor(slug): return slug.replace("-", "")
          base = "android/app/build/outputs/apk"
          def grab(fn, dest):
              hits = glob.glob(f"{base}/{fn}/debug/*.apk")
              assert hits, f"no APK for flavor {fn}"
              shutil.copy(hits[0], f"out/{dest}.apk")
          for a in apps:
              grab(flavor(a["slug"]), a["slug"])
          grab("all111wacky", "all-111-wacky-apps")
          print("collected", len(os.listdir("out")), "APKs")
          PY
          ls -lh out | tail -n +2 | awk '{print $5, $9}' | head
          echo "total: $(ls out/*.apk | wc -l)"

      - name: Publish APKs to the "apks" Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apks
          name: "📱 Wacky Apps — installable APKs"
          body: "Auto-built Android APKs for all 111 Wacky Apps + the all-in-one collection. Sideload-friendly (debug-signed)."
          files: out/*.apk
          fail_on_unmatched_files: true
